<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Laporan Penjualan Profesional</title>
    <!-- Google Fonts & FontAwesome -->
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root {
            --bg-gradient: linear-gradient(135deg, #0f172a 0%, #1e1b4b 50%, #311042 100%);
            --glass-bg: rgba(255, 255, 255, 0.03);
            --glass-border: rgba(255, 255, 255, 0.08);
            --glass-card: rgba(255, 255, 255, 0.05);
            --glass-card-hover: rgba(255, 255, 255, 0.08);
            --text-primary: #f8fafc;
            --text-secondary: #94a3b8;
            --accent-primary: #8b5cf6;
            --accent-glow: rgba(139, 92, 246, 0.3);
            --success-color: #10b981;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Plus Jakarta Sans', sans-serif;
        }

        body {
            background: var(--bg-gradient);
            background-attachment: fixed;
            min-height: 100vh;
            color: var(--text-primary);
            padding: 30px 20px;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .dashboard-wrapper {
            width: 100%;
            max-width: 1200px;
            background: var(--glass-bg);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid var(--glass-border);
            border-radius: 24px;
            padding: 35px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            animation: fadeIn 0.6s cubic-bezier(0.16, 1, 0.3, 1);
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(15px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* Header Layout */
        .dashboard-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
            padding-bottom: 20px;
            border-bottom: 1px solid var(--glass-border);
            flex-wrap: wrap;
            gap: 15px;
        }

        .header-title h1 {
            font-size: 26px;
            font-weight: 700;
            letter-spacing: -0.5px;
            color: var(--text-primary);
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .header-title h1 i {
            color: var(--accent-primary);
            background: rgba(139, 92, 246, 0.1);
            padding: 10px;
            border-radius: 12px;
            font-size: 20px;
        }

        .header-title p {
            font-size: 14px;
            color: var(--text-secondary);
            margin-top: 4px;
        }

        .header-actions {
            display: flex;
            gap: 12px;
        }

        .btn {
            padding: 11px 20px;
            border-radius: 12px;
            border: 1px solid var(--glass-border);
            cursor: pointer;
            font-weight: 600;
            font-size: 14px;
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .btn-primary {
            background: linear-gradient(135deg, #8b5cf6 0%, #6d28d9 100%);
            color: white;
            border: none;
            box-shadow: 0 4px 15px var(--accent-glow);
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(139, 92, 246, 0.5);
        }

        .btn-secondary {
            background: var(--glass-card);
            color: var(--text-primary);
        }

        .btn-secondary:hover {
            background: var(--glass-card-hover);
            border-color: rgba(255, 255, 255, 0.2);
            transform: translateY(-2px);
        }

        /* Stats Grid */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 20px;
            margin-bottom: 35px;
        }

        .stat-card {
            background: var(--glass-card);
            border: 1px solid var(--glass-border);
            padding: 24px;
            border-radius: 18px;
            display: flex;
            align-items: center;
            gap: 20px;
            transition: transform 0.3s ease, background 0.3s ease;
        }

        .stat-card:hover {
            background: var(--glass-card-hover);
            transform: translateY(-4px);
            border-color: rgba(139, 92, 246, 0.3);
        }

        .stat-icon {
            width: 55px;
            height: 55px;
            border-radius: 14px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 22px;
        }

        .stat-icon.omset { background: rgba(16, 185, 129, 0.15); color: #34d399; }
        .stat-icon.transaksi { background: rgba(59, 130, 246, 0.15); color: #60a5fa; }
        .stat-icon.menu { background: rgba(245, 158, 11, 0.15); color: #fbbf24; }

        .stat-info h3 {
            font-size: 13px;
            font-weight: 500;
            color: var(--text-secondary);
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 6px;
        }

        .stat-info p {
            font-size: 22px;
            font-weight: 700;
            color: var(--text-primary);
            letter-spacing: -0.5px;
        }

        /* Table Wrapper */
        .table-container {
            background: var(--glass-card);
            border: 1px solid var(--glass-border);
            border-radius: 18px;
            overflow: hidden;
        }

        .table-responsive {
            width: 100%;
            overflow-x: auto;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            text-align: left;
            white-space: nowrap;
        }

        th {
            background: rgba(0, 0, 0, 0.25);
            padding: 16px 20px;
            font-size: 12px;
            font-weight: 600;
            color: var(--text-secondary);
            text-transform: uppercase;
            letter-spacing: 0.8px;
            border-bottom: 1px solid var(--glass-border);
        }

        td {
            padding: 16px 20px;
            font-size: 14px;
            color: var(--text-primary);
            border-bottom: 1px solid var(--glass-border);
        }

        tbody tr {
            transition: background 0.2s ease;
        }

        tbody tr:hover {
            background: rgba(255, 255, 255, 0.02);
        }

        tbody tr:last-child td {
            border-bottom: none;
        }

        /* Badge or Text Highlights */
        .badge-pesanan {
            background: rgba(139, 92, 246, 0.15);
            color: #c4b5fd;
            padding: 6px 12px;
            border-radius: 8px;
            font-size: 13px;
            font-weight: 500;
            display: inline-block;
        }

        .empty-state {
            text-align: center;
            padding: 40px;
            color: var(--text-secondary);
            font-style: italic;
        }

        /* Print Settings */
        @media print {
            body {
                background: white;
                color: black;
                padding: 0;
            }
            .dashboard-wrapper {
                background: white;
                border: none;
                box-shadow: none;
                padding: 0;
            }
            .header-actions, .btn {
                display: none;
            }
            .stat-card, .table-container {
                border: 1px solid #ccc;
                background: #f9f9f9;
            }
            th { background: #eee; color: black; }
            td { color: black; border-bottom: 1px solid #ddd; }
            .stat-info p, .header-title h1, td, th { color: black !important; }
        }

        @media (max-width: 768px) {
            body { padding: 10px; }
            .dashboard-wrapper { padding: 20px; }
            .stats-grid { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>

<div class="dashboard-wrapper">
    <!-- Header Section -->
    <div class="dashboard-header">
        <div class="header-title">
            <h1><i class="fa-solid fa-chart-pie"></i> Laporan Penjualan</h1>
            <p>Rekapitulasi performa transaksi dan omset secara real-time</p>
        </div>
        <div class="header-actions">
            <button class="btn btn-primary" onclick="window.print()"><i class="fa-solid fa-print"></i> Cetak Laporan</button>

        </div>
    </div>
    
    <!-- Stats Box Grid -->
    <div class="stats-grid">
        <div class="stat-card">
            <div class="stat-icon omset">
                <i class="fa-solid fa-wallet"></i>
            </div>
            <div class="stat-info">
                <h3>Total Omset</h3>
                <p id="total-omset">Rp 0</p>
            </div>
        </div>
        <div class="stat-card">
            <div class="stat-icon transaksi">
                <i class="fa-solid fa-receipt"></i>
            </div>
            <div class="stat-info">
                <h3>Jumlah Transaksi</h3>
                <p id="jml-transaksi">0</p>
            </div>
        </div>
        <div class="stat-card">
            <div class="stat-icon menu">
                <i class="fa-solid fa-fire"></i>
            </div>
            <div class="stat-info">
                <h3>Menu Terlaris</h3>
                <p id="menu-terlaris">-</p>
            </div>
        </div>
    </div>

    <!-- Data Table -->
    <div class="table-container">
        <div class="table-responsive">
            <table>
                <thead>
                    <tr>
                        <th><i class="fa-solid fa-user-tag" style="margin-right: 6px;"></i> Pelanggan</th>
                        <th><i class="fa-solid fa-utensils" style="margin-right: 6px;"></i> Detail Pesanan</th>
                        <th><i class="fa-solid fa-clock" style="margin-right: 6px;"></i> Waktu Selesai</th>
                        <th><i class="fa-solid fa-money-bill-wave" style="margin-right: 6px;"></i> Total Bayar</th>
                    </tr>
                </thead>
                <tbody id="tabel-laporan">
                    <tr>
                        <td colspan="4" class="empty-state">Memuat data laporan...</td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>
</div>

<script>
    async function loadLaporan() {
        const restoId = localStorage.getItem('restoId');
        if (!restoId) { alert("Silakan login kembali."); return; }

        const token = localStorage.getItem('token') || localStorage.getItem('aksesDiberikan') || '';

        try {
            const res = await fetch(`/resto/kasir/laporan-harian?restoId=${restoId}`, {
                method: 'GET',
                headers: {
                    'Authorization': `Bearer ${token}`,
                    'Content-Type': 'application/json'
                }
            });
            
            if (!res.ok) {
                throw new Error("Gagal mengambil data, akses ditolak (403)");
            }

            const responseData = await res.json();
            const data = responseData.data || [];
            
            const tbody = document.getElementById('tabel-laporan');
            tbody.innerHTML = '';
            
            let totalOmset = 0;
            const menuCount = {};

            if (Array.isArray(data) && data.length > 0) {
                data.forEach(item => {
                    totalOmset += Number(item.totalBayar || 0);
                    
                    let detailTeks = '-';
                    try {
                        const items = typeof item.pesanan === 'string' ? JSON.parse(item.pesanan) : item.pesanan;
                        if (Array.isArray(items)) {
                            detailTeks = items.map(i => `<span class="badge-pesanan">${i.nama} × ${i.jumlah}</span>`).join(' ');
                            items.forEach(i => {
                                menuCount[i.nama] = (menuCount[i.nama] || 0) + (parseInt(i.jumlah) || 1);
                            });
                        }
                    } catch (e) {
                        detailTeks = item.pesanan || '-';
                    }
                    
                    tbody.innerHTML += `<tr>
                        <td style="font-weight: 600;">${item.nama || '-'}</td>
                        <td>${detailTeks}</td>
                        <td style="color: var(--text-secondary);">${item.waktuSelesai ? new Date(item.waktuSelesai).toLocaleTimeString('id-ID', {hour: '2-digit', minute:'2-digit'}) : '-'}</td>
                        <td style="font-weight: 700; color: #34d399;">Rp ${Number(item.totalBayar || 0).toLocaleString()}</td>
                    </tr>`;
                });

                let menuTerlaris = Object.keys(menuCount).length > 0 
                    ? Object.keys(menuCount).reduce((a, b) => (menuCount[a] > menuCount[b] ? a : b)) 
                    : 'Belum ada';
                
                document.getElementById('total-omset').innerText = 'Rp ' + totalOmset.toLocaleString();
                document.getElementById('jml-transaksi').innerText = data.length;
                document.getElementById('menu-terlaris').innerText = menuTerlaris;
            } else {
                tbody.innerHTML = `<tr><td colspan="4" class="empty-state"><i class="fa-solid fa-box-open" style="font-size: 24px; display: block; margin-bottom: 8px;"></i> Belum ada transaksi tercatat hari ini.</td></tr>`;
            }
        } catch (err) {
            console.error("Gagal memuat:", err);
            document.getElementById('tabel-laporan').innerHTML = `<tr><td colspan="4" class="empty-state" style="color: #f87171;"><i class="fa-solid fa-triangle-exclamation" style="font-size: 24px; display: block; margin-bottom: 8px;"></i> Gagal memuat data laporan dari server.</td></tr>`;
        }
    }

    // Jalankan fungsi saat halaman dimuat
    loadLaporan();
</script>
</body>
</html>

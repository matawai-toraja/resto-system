<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <title>Laporan Harian</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; padding: 40px; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); min-height: 100vh; color: #fff; }
        .glass-container { background: rgba(255, 255, 255, 0.15); backdrop-filter: blur(10px); border-radius: 20px; padding: 30px; box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.37); }
        .stats-box { display: grid; grid-template-columns: repeat(3, 1fr); gap: 15px; margin-bottom: 25px; }
        .stat-card { background: rgba(0, 0, 0, 0.2); padding: 15px; border-radius: 15px; text-align: center; }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        th { background: rgba(255, 255, 255, 0.1); padding: 15px; text-align: left; }
        td { padding: 15px; border-bottom: 1px solid rgba(255, 255, 255, 0.1); }
        button, a { padding: 10px 20px; border-radius: 10px; border: none; cursor: pointer; background: rgba(255, 255, 255, 0.2); color: white; text-decoration: none; font-weight: bold; transition: 0.3s; }
        button:hover, a:hover { background: rgba(255, 255, 255, 0.4); }
    </style>
</head>
<body>
<div class="glass-container">
    <h1>Laporan Penjualan</h1>
    
    <div class="stats-box">
        <div class="stat-card"><h3>Omset</h3><p id="total-omset">Rp 0</p></div>
        <div class="stat-card"><h3>Transaksi</h3><p id="jml-transaksi">0</p></div>
        <div class="stat-card"><h3>Menu Terlaris</h3><p id="menu-terlaris">-</p></div>
    </div>

    <table>
        <thead>
            <tr>
                <th>Pelanggan</th>
                <th>Detail Pesanan</th>
                <th>Waktu</th>
                <th>Total Bayar</th>
            </tr>
        </thead>
        <tbody id="tabel-laporan"></tbody>
    </table>
    <br><br>
    <button onclick="window.print()">Cetak Laporan</button>
    <a href="kasir-monitor.html">Kembali</a>
</div>

<script>
    async function loadLaporan() {
        const restoId = localStorage.getItem('restoId');
        if (!restoId) { alert("Silakan login kembali."); return; }

        try {
            // Logika inti: Tetap mengambil data riwayat harian yang sudah benar
            const res = await fetch(`/menu/laporan/harian?restoId=${restoId}`);
            const data = await res.json();
            
            const tbody = document.getElementById('tabel-laporan');
            tbody.innerHTML = '';
            
            let totalOmset = 0;
            const menuCount = {};

            if (Array.isArray(data)) {
                data.forEach(item => {
                    totalOmset += Number(item.totalBayar || 0);
                    
                    // Logika Menu Terlaris
                    if (item.pesanan) {
                        item.pesanan.split(', ').forEach(p => {
                            const [nama, jml] = p.split(' x');
                            menuCount[nama] = (menuCount[nama] || 0) + (parseInt(jml) || 1);
                        });
                    }
                    
                    // Render Tabel
                    tbody.innerHTML += `<tr>
                        <td>${item.nama || '-'}</td>
                        <td>${item.pesanan || '-'}</td>
                        <td>${item.waktuSelesai ? new Date(item.waktuSelesai).toLocaleTimeString('id-ID', {hour: '2-digit', minute:'2-digit'}) : '-'}</td>
                        <td>Rp ${Number(item.totalBayar || 0).toLocaleString()}</td>
                    </tr>`;
                });

                // Update Statistik
                let menuTerlaris = Object.keys(menuCount).reduce((a, b) => (menuCount[a] > menuCount[b] ? a : b), 'Belum ada');
                document.getElementById('total-omset').innerText = 'Rp ' + totalOmset.toLocaleString();
                document.getElementById('jml-transaksi').innerText = data.length;
                document.getElementById('menu-terlaris').innerText = menuTerlaris;
            }
        } catch (err) {
            console.error("Gagal memuat:", err);
        }
    }

    loadLaporan();
</script>
</body>
</html>


<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Menu Digital Resto</title>
    <style>
.resto-card {
    /* 1. Warna latar belakang transparan (putih dengan opacity 40%) */
    background: rgba(255, 255, 255, 0.4) !important;
    
    /* 2. Efek blur di belakang kartu */
    backdrop-filter: blur(15px);
    -webkit-backdrop-filter: blur(15px);
    
    /* 3. Border tipis untuk kesan kristal */
    border: 1px solid rgba(255, 255, 255, 0.3);
    
    /* 4. Shadow lembut */
    box-shadow: 0 8px 32px 0 rgba(31, 38, 135, 0.15);
    
    /* 5. Sudut membulat */
    border-radius: 20px;
}

.glass-effect {
    background: rgba(255, 255, 255, 0.7); /* Warna putih semi-transparan */
    backdrop-filter: blur(10px);          /* Efek buram seperti kaca */
    -webkit-backdrop-filter: blur(10px);  /* Dukungan untuk Safari */
    border: 1px solid rgba(255, 255, 255, 0.3); /* Border tipis untuk kesan kristal */
    box-shadow: 0 8px 32px 0 rgba(31, 38, 135, 0.15); /* Bayangan lembut */
    border-radius: 20px; /* Sudut membulat agar lebih manis */
}
.menu-card { 
    background: white; 
    padding: 8px; /* Padding luar diperkecil agar gambar lebih luas */
    border-radius: 20px; 
    box-shadow: 0 8px 20px rgba(0,0,0,0.06); 
    text-align: center; 
    transition: 0.3s;
    border: 1px solid #f0f0f0;
}

.menu-card img { 
    width: 100%;           /* Lebar mengikuti lebar kartu */
    aspect-ratio: 1 / 1;   /* INI YANG MEMBUAT LEBAR DAN TINGGI SELALU SAMA */
    object-fit: cover;     /* Memastikan gambar memenuhi kotak tanpa distorsi/gepeng */
    border-radius: 16px;   /* Sudut melengkung yang elegan */
    margin-bottom: 8px; 
    display: block;        /* Menghindari spasi aneh di bawah gambar */
}
.resto-card {
    /* Ganti warna di sini */
    background-color: #e9ecef; /* Abu-abu muda yang elegan */
    
    /* Tambahan agar lebih manis */
    border-radius: 15px;
    padding: 20px;
    box-shadow: 0 4px 6px rgba(0,0,0,0.05); /* Bayangan tipis agar kartu tampak menonjol */
}
.resto-card {
    /* Warna abu-abu muda dengan transparansi untuk efek kaca */
    background-color: rgba(233, 236, 239, 0.6) !important; 
    
    /* Efek buram (glassmorphism) */
    backdrop-filter: blur(15px);
    -webkit-backdrop-filter: blur(15px);
    
    /* Border halus untuk mempertegas kesan kaca */
    border: 1px solid rgba(255, 255, 255, 0.3);
    
    /* Sudut membulat dan bayangan lembut */
    border-radius: 20px;
    box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.1);
    
    /* Padding dan margin agar layout tidak berantakan */
    padding: 20px;
    margin-bottom: 20px;
}
body {
    background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%); /* Contoh background lembut */
    min-height: 100vh;
    padding: 20px;
}
.menu-card h3 { 
    font-size: 1em; 
    margin: 4px 0; /* Spasi rapat untuk nama */
    color: #2d3436; 
}

.menu-card p { 
    font-size: 0.9em; 
    color: #27ae60; 
    font-weight: 700; 
    margin: 0 0 10px 0; /* Spasi rapat untuk harga */
}

.menu-card button { 
    width: 90%; /* Tombol sedikit lebih ramping terlihat lebih elegan */
    padding: 8px; 
    border: none; 
    border-radius: 10px; 
    font-weight: 600; 
    background: #27ae60; 
    color: white;
}        body { font-family: 'Segoe UI', sans-serif; background-color: #f8f9fa; margin: 0; padding: 20px; color: #333; }
        .container-utama { max-width: 500px; margin: auto; }
        .resto-card { background: white; padding: 20px; border-radius: 20px; box-shadow: 0 4px 10px rgba(0,0,0,0.05); text-align: center; margin-bottom: 20px; }
        .btn-wa-elegan { background: linear-gradient(135deg, #27ae60, #2ecc71); color: white; border: none; padding: 12px 25px; border-radius: 50px; font-weight: 600; cursor: pointer; }
        .menu-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 15px; }
        @media (max-width: 480px) { .menu-grid { grid-template-columns: 1fr; } }
        .menu-card { background: white; padding: 10px; border-radius: 15px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); text-align: center; }
        
        #modal-keranjang { display: none; position: fixed; top:0; left:0; width:100%; height:100%; background: rgba(0,0,0,0.5); z-index: 1000; justify-content: center; align-items: center; }
        .modal-content { background: white; padding: 20px; border-radius: 20px; width: 90%; max-width: 400px; }
    </style>
</head>
<body>

<div class="app-wrapper" style="background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); min-height: 100vh;">
        <div class="resto-card" id="header-area">
        <div class="container-utama" id="container-utama">
            <div class="resto-card" id="header-area">
 <p style="font-size: 0,9em; color: #666;">Selamat Datang di</p>
                <h1 id="nama-restoran" style="font-size: 25px;">Memuat...</h1>
               
<p style="font-size: 0.8em; color: #444;">silahkan pilih menu favorit Anda!</p>
                <button class="btn-wa-elegan" onclick="bukaWhatsApp()">Hubungi Resto via WhatsApp</button>
            </div>

            <div class="resto-card">
                <h2 style="font-size: 16px; margin-bottom: 8px;">Pilih Menu Anda</h2>
                <select id="filter" onchange="tampilkanMenu()" style="width: 100%; padding: 10px; border-radius: 10px; border: 1px solid #ddd;">
                    <option value="Semua">Semua</option>
                    <option value="Makanan">Makanan</option>
                    <option value="Minuman">Minuman</option>
                </select>
                <input type="text" id="searchInput" placeholder="Cari menu..." onkeyup="tampilkanMenu()" style="width: 100%; padding: 10px; margin-top: 10px; border-radius: 10px; border: 1px solid #ddd; box-sizing: border-box;">
            </div>

            <div id="menu-list" class="menu-grid"></div>
        </div>
    </div>

    <div id="modal-keranjang">
        <div class="modal-content">
            <h3>Daftar Pesanan Anda</h3>
            <input type="text" id="nama-modal" placeholder="Nama Anda" style="width:100%; margin-bottom:10px; padding:8px; box-sizing:border-box;">
            <input type="number" id="meja-modal" placeholder="Nomor Meja" style="width:100%; margin-bottom:10px; padding:8px; box-sizing:border-box;">
            <div id="keranjang-list"></div>
            <div id="total-harga" style="font-weight:bold; margin-top:10px;">Total: Rp 0</div>
            <button onclick="prosesKirimPesanan()" style="width:100%; margin-top:10px; padding:10px; background:#2980b9; color:white; border:none; border-radius:5px;">Kirim Pesanan</button>
            <button onclick="tutupModal()" style="width:100%; margin-top:5px; padding:10px; background:#f0f0f0; border:none; border-radius:5px;">Tambah Menu Lain</button>
        </div>
    </div>

    <div id="tombol-keranjang-container" style="position:fixed; bottom:20px; right:20px; background:#27ae60; color:white; padding:15px; border-radius:50px; cursor:pointer; z-index:999;" onclick="bukaModal()">
        🛒 <span id="cart-count">Keranjang (0)</span>
    </div>

<script>
    let menuData = [], keranjang = [], waNumber = "";
    const restoId = new URLSearchParams(window.location.search).get('restoId') || 1;

    function refreshData() {
        // Jangan refresh data jika halaman sedang dalam status sukses
        if (localStorage.getItem('pesananSukses')) return;
        
        fetch(`/menu/${restoId}`).then(res => res.json()).then(data => { menuData = data; tampilkanMenu(); });
        fetch(`/menu/resto/wa?restoId=${restoId}`).then(res => res.text()).then(text => waNumber = text.trim().replace(/['"]/g, ''));
        fetch(`/menu/resto/info?restoId=${restoId}`).then(res => res.json()).then(data => { document.getElementById('nama-restoran').innerText = data.namaResto; });
    }

    function tampilkanMenu() {
        const filter = document.getElementById('filter').value;
        const search = document.getElementById('searchInput').value.toLowerCase();
        const filtered = menuData.filter(m => (filter === "Semua" || m.kategori === filter) && m.nama.toLowerCase().includes(search));
        
        const list = document.getElementById('menu-list');
        if(!list) return;

        list.innerHTML = filtered.map(m => `
            <div class="menu-card">
                <img src="${m.gambar || 'https://via.placeholder.com/150'}">
                <h3>${m.nama}</h3>
                <p>Rp ${Number(m.harga).toLocaleString()}</p>
                <button onclick="tambahKeKeranjang(${m.id})" ${m.stok <= 0 ? 'disabled style="background:#95a5a6; cursor:not-allowed;"' : 'style="background:#27ae60;"'}>
                    ${m.stok > 0 ? 'Tambah' : 'Habis'}
                </button>
            </div>
        `).join('');
    }

function renderHalamanSukses(data) {
    const tempDiv = document.createElement('div');
    tempDiv.innerHTML = data.rincianHtml;
    
    // Pembersihan elemen rincian
    tempDiv.querySelectorAll('button').forEach(btn => btn.remove());
    tempDiv.querySelectorAll('div, span').forEach(el => {
        if (el.querySelector('button') || el.innerText.trim() === '') el.remove();
    });
    tempDiv.querySelectorAll('small').forEach(el => el.remove());
    tempDiv.querySelectorAll('*').forEach(el => el.style.marginBottom = '0px');
    
    const rincianBersih = tempDiv.innerHTML;

    // Tampilan dengan efek kaca
    document.getElementById('container-utama').innerHTML = `
        <div class="resto-card" style="
            text-align: center; 
            padding: 20px; 
            background: rgba(255, 255, 255, 0.6); 
            backdrop-filter: blur(15px); 
            -webkit-backdrop-filter: blur(15px); 
            border: 1px solid rgba(255, 255, 255, 0.3); 
            border-radius: 20px; 
            box-shadow: 0 8px 32px 0 rgba(31, 38, 135, 0.15);
        ">
            <h2 style="color:#27ae60; margin: 0 0 5px 0;">Terima Kasih, ${data.nama}!</h2>
            
            <p style="font-size: 0.9em; color: #555; margin: 0 0 5px 0; font-weight: bold;">
                ID Pesanan: #${data.id || '-'}
            </p>
            
            <p style="margin: 0 0 10px 0;">Pesanan untuk Meja ${data.meja} telah diterima.</p>
            
            <div style="text-align:left; margin: 5px 0; border-top: 1px solid rgba(0,0,0,0.05); border-bottom: 1px solid rgba(0,0,0,0.05); padding: 8px 0; line-height: 1.4;">
                ${rincianBersih}
            </div>
            
            <div style="font-weight:bold; font-size: 1.2em; margin: 10px 0;">${data.total}</div>
            
            <button onclick="bukaWhatsApp()" style="width:100%; padding: 12px; background: #27ae60; color: white; border: none; border-radius: 12px; cursor: pointer; font-weight: 600;">Konfirmasi via WA</button>
            <button onclick="kembaliKeMenu()" style="width:100%; margin-top:8px; padding:12px; background: rgba(243, 156, 18, 0.9); color: white; border: none; border-radius: 12px; cursor: pointer; font-weight: 600;">Pesan Lagi</button>
            
            <div style="margin-top: 15px; color: #777; font-size: 0.75em; font-style: italic;">
                <p style="margin: 0;">* Pesanan tidak bisa diBATALKAN, silahkan konfirmasi WA jika ingin membatalkan pesanan atau ingin konfirmasi pesanan & lain-lain.</p>
            </div>
        </div>
    `;
    document.getElementById('tombol-keranjang-container').style.display = 'none';
}  function kembaliKeMenu() {
        localStorage.removeItem('pesananSukses');
        location.reload(); 
    }

    function tambahKeKeranjang(id) { 
        const item = menuData.find(m => m.id === id); 
        if (keranjang.find(c => c.id === id)) keranjang.find(c => c.id === id).jumlah++; 
        else keranjang.push({ ...item, jumlah: 1 }); 
        renderKeranjang(); 
    }

  function renderKeranjang() { 
    const list = document.getElementById('keranjang-list'); 
    let total = 0; 
    
    // Menggunakan index (idx) untuk memanipulasi item spesifik dalam array
    list.innerHTML = keranjang.map((c, idx) => { 
        total += c.harga * c.jumlah; 
        return `
            <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:10px; border-bottom:1px solid #eee; padding-bottom:5px;">
                <span style="flex:1;">${c.nama} <br><small>Rp ${c.harga.toLocaleString()} x ${c.jumlah}</small></span>
                <div style="display:flex; align-items:center; gap:8px;">
                    <button onclick="updateJumlah(${idx}, -1)" style="padding:2px 8px; cursor:pointer;">-</button>
                    <span>${c.jumlah}</span>
                    <button onclick="updateJumlah(${idx}, 1)" style="padding:2px 8px; cursor:pointer;">+</button>
                    <button onclick="hapusItem(${idx})" style="padding:2px 8px; cursor:pointer; background:#e74c3c; color:white; border:none; border-radius:4px;">✕</button>
                </div>
            </div>`;
    }).join(''); 
    
    document.getElementById('total-harga').innerText = `Total: Rp ${total.toLocaleString()}`; 
    document.getElementById('cart-count').textContent = `Keranjang (${keranjang.reduce((a, b) => a + b.jumlah, 0)})`; 
}

// Fungsi pendukung yang harus ditambahkan di bawahnya:
function updateJumlah(index, perubahan) {
    keranjang[index].jumlah += perubahan;
    if (keranjang[index].jumlah <= 0) {
        hapusItem(index);
    } else {
        renderKeranjang();
    }
}

function hapusItem(index) {
    keranjang.splice(index, 1);
    renderKeranjang();
}
   function prosesKirimPesanan() { 
        const nama = document.getElementById('nama-modal').value; 
        const meja = document.getElementById('meja-modal').value; 
        if (!nama || !meja) return alert("Isi Nama & Meja!"); 
        
        fetch('/menu/kasir/pesan-semua', { 
            method: 'POST', 
            headers: {'Content-Type': 'application/json'}, 
            body: JSON.stringify({ nama, meja, pesanan: keranjang, restoId: Number(restoId) }) 
        })
        .then(res => res.json()) // Menangkap respons dari server sebagai JSON
        .then(data => { 
            const dataSukses = { 
                id: data.id, // Menangkap ID dari server
                nama, 
                meja, 
                rincianHtml: document.getElementById('keranjang-list').innerHTML, 
                total: document.getElementById('total-harga').innerText 
            }; 
            localStorage.setItem('pesananSukses', JSON.stringify(dataSukses)); 
            renderHalamanSukses(dataSukses); 
            tutupModal(); 
            keranjang = [];
        }); 
    }
    function bukaModal() { document.getElementById('modal-keranjang').style.display = 'flex'; }
    function tutupModal() { document.getElementById('modal-keranjang').style.display = 'none'; }
    async function bukaWhatsApp() { window.open(`https://wa.me/${waNumber.replace(/[^0-9]/g, '')}`, '_blank'); }

    window.onload = function() {
        refreshData();
        setInterval(refreshData, 3000);
        const dataTersimpan = localStorage.getItem('pesananSukses');
        if (dataTersimpan) renderHalamanSukses(JSON.parse(dataTersimpan));
    };
</script>
</body>
</html>

<body>

<div id="header-container" style="flex-shrink: 0; padding: 15px; background: #667eea; color: white;">
    <div class="container-utama" id="container-utama" style="max-width: 500px; margin: auto;">
        
        <!-- Info Resto -->
        <div style="text-align: center; margin-bottom: 15px;">
            <p style="font-size: 0.8em; opacity: 0.8; margin: 0;">Selamat Datang di</p>
            <h1 id="nama-restoran" style="font-size: 25px; margin: 5px 0;">Memuat...</h1>
        <button onclick="bukaWhatsApp()" style="background: #25d366; color: #0000FF; border: none; padding: 8px 20px; border-radius: 20px; font-weight: bold; cursor: pointer; margin-top: 5px;">

<p style="margin-top: 10px; color: white; font-size: 14px;">

<div id="pilihan-pembayaran" style="margin: 20px 0;">

<div id="modal-qris" style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.8); z-index:2000; justify-content:center; align-items:center; padding:20px;">
    <div class="modal-content" style="text-align:center;">

</div>

            <button onclick="tutupModal()" style="width:100%; margin-top:5px; padding:10px; background:#f0f0f0; border:none; border-radius:5px;">Tambah Menu Lain</button>
        </div>
    </div>

    <div id="tombol-keranjang-container" style="position:fixed; bottom:20px; right:20px; background:#27ae60; color:white; padding:15px; border-radius:50px; cursor:pointer; z-index:999;" onclick="bukaModal()">
        🛒 <span id="cart-count">Keranjang (0)</span>
    </div>

<script>
(function() {
    const DURASI_SESI = 3600000; // 1 jam dalam milidetik
    let sessionStart = localStorage.getItem('session_start');

    if (!sessionStart) {
        // Jika belum ada sesi, buat sesi baru sekarang
        localStorage.setItem('session_start', new Date().getTime());
    } else {
        // Jika sudah ada, cek apakah sudah lebih dari 1 jam
        if (new Date().getTime() - Number(sessionStart) > DURASI_SESI) {
            alert("Waktu sesi Anda telah berakhir. Silakan scan ulang QR untuk memesan kembali.");
            localStorage.clear(); // Hapus semua data lama
            location.reload();    // Refresh halaman
        }
    }
})();
    let menuData = [], keranjang = [], waNumber = "";
    const restoId = new URLSearchParams(window.location.search).get('restoId') || 1;

    function refreshData() {
        // Jangan refresh data jika halaman sedang dalam status sukses
        if (localStorage.getItem('pesananSukses')) return;
        
        fetch(`/menu/${restoId}`).then(res => res.json()).then(data => { menuData = data; tampilkanMenu(); });
        fetch(`/menu/resto/wa?restoId=${restoId}`).then(res => res.text()).then(text => waNumber = text.trim().replace(/['"]/g, ''));
        fetch(`/menu/resto/info?restoId=${restoId}`).then(res => res.json()).then(data => { document.getElementById('nama-restoran').innerText = data.namaResto; });
    }

   function tampilkanMenu() {
        // 1. Ambil elemen HTML-nya terlebih dahulu
        const filterElement = document.getElementById('filter');
        const searchElement = document.getElementById('searchInput');
        const list = document.getElementById('menu-list');

        // 🛡️ KUNCI PENGAMAN: Jika salah satu elemen filter/search atau menu-list 
        // sudah hilang dari layar (karena beralih ke halaman sukses), langsung hentikan fungsi ini!
        if (!filterElement || !searchElement || !list) return;

        // 2. Jika elemennya aman dan ada di layar, baru ambil value-nya
        const filter = filterElement.value;
        const search = searchElement.value.toLowerCase();
        
        const filtered = menuData.filter(m => (filter === "Semua" || m.kategori === filter) && m.nama.toLowerCase().includes(search));
        
        list.innerHTML = filtered.map(m => `
            <div class="menu-card">
                <img src="${m.gambarUrl || 'https://via.placeholder.com/200'}">
                <h3>${m.nama}</h3>
                <p>Rp ${Number(m.harga).toLocaleString()}</p>
                <button onclick="tambahKeKeranjang(${m.id})" ${m.stok <= 0 ? 'disabled style="background:#95a5a6; cursor:not-allowed;"' : 'style="background:#27ae60;"'}>
                    ${m.stok > 0 ? 'Tambah' : 'Habis'}
                </button>
            </div>
        `).join('');
    }
function bukaWhatsApp() {
    if (!waNumber) {
        alert("Nomor belum disetting.");
        return;
    }
    
    // Pastikan nomor bersih dari spasi/karakter lain
    let cleanNomor = waNumber.replace(/\D/g, '');
    
    // Pastikan awalan 62
    if (cleanNomor.startsWith('0')) {
        cleanNomor = '62' + cleanNomor.substring(1);
    }

    // Cara paling ampuh: arahkan ke wa.me
    // Jangan gunakan api.whatsapp.com yang akan memicu halaman 'Buka Aplikasi'
    const url = 'https://wa.me/' + cleanNomor;
    
    // Buka di tab baru
    window.open(url, '_blank');
}
function renderHalamanSukses(data) {
    const tempDiv = document.createElement('div');
    tempDiv.innerHTML = data.rincianHtml;
    
    // Pembersihan elemen rincian
    tempDiv.querySelectorAll('button').forEach(btn => btn.remove());
    tempDiv.querySelectorAll('div, span').forEach(el => {
        if (el.querySelector('button') || el.innerText.trim() === '') el.remove();
    });
    tempDiv.querySelectorAll('small').forEach(el => el.remove());
    tempDiv.querySelectorAll('*').forEach(el => el.style.marginBottom = '0px');
    
    const rincianBersih = tempDiv.innerHTML;

    // Tampilan dengan efek kaca
    document.getElementById('container-utama').innerHTML = `
        <div class="resto-card" style="
            text-align: center; 
            padding: 20px; 
            background: rgba(255, 255, 255, 0.6); 
            backdrop-filter: blur(15px); 
            -webkit-backdrop-filter: blur(15px); 
            border: 1px solid rgba(255, 255, 255, 0.3); 
            border-radius: 20px; 
            box-shadow: 0 8px 32px 0 rgba(31, 38, 135, 0.15);
        ">
            <h2 style="color:#27ae60; margin: 0 0 5px 0;">Terima Kasih, ${data.nama}!</h2>
            
            <p style="font-size: 0.9em; color: #555; margin: 0 0 5px 0; font-weight: bold;">
                ID Pesanan: #${data.id || '-'}
            </p>
            
            <p style="margin: 0 0 10px 0;">Pesanan untuk Meja ${data.meja} telah diterima.</p>
            
            <div style="text-align:left; margin: 5px 0; border-top: 1px solid rgba(0,0,0,0.05); border-bottom: 1px solid rgba(0,0,0,0.05); padding: 8px 0; line-height: 1.4;">
                ${rincianBersih}
            </div>
            
            <div style="font-weight:bold; font-size: 1.2em; margin: 10px 0;">${data.total}</div>
            
            <button onclick="bukaWhatsApp()" style="width:100%; padding: 12px; background: #27ae60; color: white; border: none; border-radius: 12px; cursor: pointer; font-weight: 600;">Konfirmasi via WA</button>
            <button onclick="kembaliKeMenu()" style="width:100%; margin-top:8px; padding:12px; background: rgba(243, 156, 18, 0.9); color: white; border: none; border-radius: 12px; cursor: pointer; font-weight: 600;">Pesan Lagi</button>
            
            <div style="margin-top: 15px; color: #777; font-size: 0.75em; font-style: italic;">
                <p style="margin: 0;">* Pesanan tidak bisa diBATALKAN, silahkan konfirmasi WA jika ingin membatalkan pesanan atau ingin konfirmasi pesanan & lain-lain.</p>
            </div>
        </div>
    `;
    document.getElementById('tombol-keranjang-container').style.display = 'none';
}  function kembaliKeMenu() {
        localStorage.removeItem('pesananSukses');
        location.reload(); 
    }

    function tambahKeKeranjang(id) { 
        const item = menuData.find(m => m.id === id); 
        if (keranjang.find(c => c.id === id)) keranjang.find(c => c.id === id).jumlah++; 
        else keranjang.push({ ...item, jumlah: 1 }); 
        renderKeranjang(); 
    }

  function renderKeranjang() { 
    const list = document.getElementById('keranjang-list'); 
    let total = 0; 
    
    // Menggunakan index (idx) untuk memanipulasi item spesifik dalam array
    list.innerHTML = keranjang.map((c, idx) => { 
        total += c.harga * c.jumlah; 
        return `
            <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:10px; border-bottom:1px solid #eee; padding-bottom:5px;">
                <span style="flex:1;">${c.nama} <br><small>Rp ${c.harga.toLocaleString()} x ${c.jumlah}</small></span>
                <div style="display:flex; align-items:center; gap:8px;">
                    <button onclick="updateJumlah(${idx}, -1)" style="padding:2px 8px; cursor:pointer;">-</button>
                    <span>${c.jumlah}</span>
                    <button onclick="updateJumlah(${idx}, 1)" style="padding:2px 8px; cursor:pointer;">+</button>
                    <button onclick="hapusItem(${idx})" style="padding:2px 8px; cursor:pointer; background:#e74c3c; color:white; border:none; border-radius:4px;">✕</button>
                </div>
            </div>`;
    }).join(''); 
    
    document.getElementById('total-harga').innerText = `Total: Rp ${total.toLocaleString()}`; 
    document.getElementById('cart-count').textContent = `Keranjang (${keranjang.reduce((a, b) => a + b.jumlah, 0)})`; 
}

// Fungsi pendukung yang harus ditambahkan di bawahnya:
function updateJumlah(index, perubahan) {
    keranjang[index].jumlah += perubahan;
    if (keranjang[index].jumlah <= 0) {
        hapusItem(index);
    } else {
        renderKeranjang();
    }
}

function hapusItem(index) {
    keranjang.splice(index, 1);
    renderKeranjang();
}
function prosesKirimPesanan(event) {
    const nama = document.getElementById('nama-modal').value;
    const meja = document.getElementById('meja-modal').value;
    const metodePembayaran = document.querySelector('input[name="metode"]:checked').value;

    if (!nama || !meja) return alert("Isi Nama & Meja!");
    if (keranjang.length === 0) return alert("Keranjang masih kosong!");

    const tombol = event.target;
    tombol.disabled = true;
    tombol.innerText = "Mengirim...";

    // Dapatkan lokasi GPS untuk keamanan/validasi area resto
    navigator.geolocation.getCurrentPosition((position) => {
        const payload = {
            nama, 
            meja, 
            pesanan: keranjang, 
            restoId: Number(restoId),
            latPelanggan: position.coords.latitude,
            lonPelanggan: position.coords.longitude,
            metodePembayaran: metodePembayaran,
            sessionStart: localStorage.getItem('session_start'),
            // Tambahkan totalHarga agar dibaca oleh NestJS PaymentService
            totalHarga: keranjang.reduce((s, i) => s + (Number(i.harga) * Number(i.jumlah)), 0)
        };

        // Kirim data langsung ke endpoint NestJS controller
        fetch('/resto/kasir/pesan-semua', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(payload)
        })
        .then(res => {
            if (!res.ok) throw new Error("Gagal mengirim pesanan ke server!");
            return res.json();
        })
        .then(data => {
            alert("Pesanan berhasil dibuat!");
            tutupModal();

            // SINKRONISASI MIDTRANS: Jika memilih digital, langsung buka portal pembayaran QRIS/Transfer
            if (metodePembayaran === 'digital' && data.paymentUrl) {
                // Mengarahkan pelanggan ke halaman pembayaran dinamis Midtrans Snap
                window.location.href = data.paymentUrl; 
            } else {
                // Jika tunai, simpan status sukses lokal dan render struk pemesanan
                const totalText = document.getElementById('total-harga').innerText;
                const rincianHtml = document.getElementById('keranjang-list').innerHTML;
                
                const dataSukses = {
                    id: data.id,
                    nama: nama,
                    meja: meja,
                    total: totalText,
                    rincianHtml: rincianHtml
                };

                localStorage.setItem('pesananSukses', JSON.stringify(dataSukses));
                renderHalamanSukses(dataSukses);
                keranjang = [];
                renderKeranjang();
            }
        })
        .catch(err => {
            alert(err.message);
        })
        .finally(() => {
            tombol.disabled = false;
            tombol.innerText = "Kirim Pesanan";
        });

    }, (error) => {
        alert("GPS diperlukan untuk validasi keamanan pemesanan di area restoran.");
        tombol.disabled = false;
        tombol.innerText = "Kirim Pesanan";
    });
}
function bukaModal() { document.getElementById('modal-keranjang').style.display = 'flex'; }
    function tutupModal() { document.getElementById('modal-keranjang').style.display = 'none'; }
function refreshData() {
    // Gunakan URL string biasa dengan penggabungan + jika backtick bermasalah
    const timestamp = Date.now();
    
    // Fetch menu
    fetch('/menu/' + restoId + '?t=' + timestamp)
        .then(res => res.json())
        .then(data => { 
            menuData = data; 
            tampilkanMenu(); 
        });

    // Fetch WA
    fetch('/menu/resto/wa?restoId=' + restoId + '&t=' + timestamp)
        .then(res => res.text())
        .then(text => { 
            waNumber = text.trim().replace(/['"]/g, ''); 
        });

    // Fetch Info
    fetch('/menu/resto/info?restoId=' + restoId + '&t=' + timestamp)
        .then(res => res.json())
        .then(data => { 
            document.getElementById('nama-restoran').innerText = data.namaResto; 
        });
}

window.onload = function() {
    // 1. Panggil fungsi utama Anda sekali saja
    refreshData();
    
    // 2. Hanya setInterval yang kita modifikasi untuk refresh menu
    // Gunakan ?t=${Date.now()} agar terhindar dari cache 304
    setInterval(function() {
        fetch(`/menu/${restoId}?t=${Date.now()}`)
            .then(res => res.json())
            .then(data => { 
                menuData = data; 
                tampilkanMenu(); 
            });
    }, 3000); // Ganti angka 3000 ini sesuai durasi yang Anda inginkan

    // 3. Logika lain Anda tetap berjalan normal
    const dataTersimpan = localStorage.getItem('pesananSukses');
    if (dataTersimpan) renderHalamanSukses(JSON.parse(dataTersimpan));
};
</script>

<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard Resto Admin - Profesional</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
.settings-active-wrapper {
    padding: 30px;
    height: 100%;
    overflow-y: auto;
    background: #090d16;
}

/* Penyesuaian khusus saat dibuka di HP / Layar Kecil (max-width: 768px) */
@media screen and (max-width: 768px) {
    body {
        flex-direction: column;
        overflow: auto !important;
    }

    .main-content {
        width: 100% !important;
        height: auto !important;
        min-height: 100vh;
        overflow-y: visible !important;
    }

    /* Membuat tampilan pengaturan langsung turun ke bawah berjejer 1 kolom */
    .settings-active-wrapper {
        padding: 15px !important;
        height: auto !important;
        overflow-y: visible !important;
    }

    .settings-grid {
        grid-template-columns: 1fr !important; /* Kartu pengaturan jadi 1 kolom ke bawah di HP */
        gap: 15px;
    }
}
/* --- RESPONSIF UNTUK HP / LAYAR KECIL --- */
@media screen and (max-width: 768px) {
    body {
        flex-direction: column; /* Ubah layout dari samping-sampingan menjadi atas-bawah di HP */
        overflow: auto;         /* Izinkan halaman bisa di-scroll secara vertikal */
    }

    .sidebar {
        width: 100% !important;  /* Sidebar memenuhi lebar layar HP */
        height: auto !important; /* Tinggi menyesuaikan isi kontennya */
        position: relative;
    }

    .main-content {
        width: 100% !important;  /* Area konten utama memenuhi lebar layar */
        height: auto !important;
        min-height: 80vh;
        overflow: visible;
    }

    .sidebar-top {
        max-height: none;        /* Hilangkan batasan scroll sidebar di HP */
    }
}
        .hidden { display: none !important; }
        :root {
            --bg-gradient: linear-gradient(135deg, #0f172a 0%, #1e1b4b 50%, #311042 100%);
            --glass-card: rgba(255, 255, 255, 0.05);
            --glass-border: rgba(255, 255, 255, 0.08);
            --text-primary: #f8fafc;
            --text-secondary: #94a3b8;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Plus Jakarta Sans', sans-serif;
        }

        body { 
            background: var(--bg-gradient); 
            background-attachment: fixed;
            min-height: 100vh; 
            margin: 0; 
            display: flex;
            color: var(--text-primary);
            overflow: hidden;
        }

        /* SIDEBAR KIRI (RINGKAS & RAPI) */
        .sidebar {
            width: 320px;
            height: 100vh;
            background: rgba(15, 23, 42, 0.95);
            backdrop-filter: blur(20px);
            border-right: 1px solid var(--glass-border);
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            z-index: 10;
        }

        .sidebar-top {
            padding: 20px;
            overflow-y: auto;
            flex: 1;
        }

        .sidebar-top::-webkit-scrollbar { width: 4px; }
        .sidebar-top::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 4px; }

        .container-box { 
            background: var(--glass-card); 
            padding: 15px; 
            border-radius: 12px; 
            border: 1px solid var(--glass-border);
            margin-bottom: 15px;
        }

        .container-box h1, .container-box h3 {
            font-size: 14px;
            margin-bottom: 8px;
            color: var(--text-primary);
            border-bottom: 1px solid var(--glass-border);
            padding-bottom: 5px;
        }
        .container-box h1 { font-size: 16px; text-align: center; }

        button { 
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            width: 100%; 
            color: white; 
            padding: 10px 12px; 
            margin: 6px 0; 
            background: rgba(255, 255, 255, 0.08); 
            border: 1px solid var(--glass-border);
            border-radius: 8px; 
            cursor: pointer; 
            font-weight: 600;
            font-size: 13px;
            transition: all 0.2s;
        }
        button:hover { background: rgba(255, 255, 255, 0.15); }

        input { 
            width: 100%; 
            padding: 8px 10px; 
            margin: 4px 0 8px 0; 
            border-radius: 6px; 
            border: 1px solid var(--glass-border); 
            background: rgba(255, 255, 255, 0.05);
            color: var(--text-primary);
            font-size: 12px;
            outline: none;
        }
        input[type="text"]#linkMenuSaya { color: #000 !important; font-weight: bold; background: #e2e8f0; }

        label { color: var(--text-secondary); font-size: 11px; display: block; margin-bottom: 2px; }

        .logout-btn { background: rgba(239, 68, 68, 0.2); border-color: rgba(239, 68, 68, 0.3); }

        /* KANAN (AREA KONTEN / IFRAME / HALAMAN PENGATURAN) */
        .main-content {
            flex: 1;
            width: calc(100vw - 320px);
            height: 100vh;
            background: #090d16;
            position: relative;
            overflow: hidden;
        }

        .content-frame {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            border: none;
            background: #090d16;
        }

        .welcome-placeholder {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100%;
            color: var(--text-secondary);
            text-align: center;
            padding: 40px;
        }
        .welcome-placeholder i { font-size: 64px; color: #334155; margin-bottom: 20px; }
        .welcome-placeholder h2 { color: var(--text-primary); margin-bottom: 10px; font-size: 22px; }

        /* KONTENEER PENGATURAN YANG AKAN MUNCUL DI SEBELAH KANAN */
        .settings-container {
            padding: 30px;
            height: 100%;
            overflow-y: auto;
            background: #090d16;
        }
        .settings-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(320px, 1fr));
            gap: 20px;
            max-width: 1200px;
            margin: 0 auto;
        }
        .settings-card {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid var(--glass-border);
            padding: 20px;
            border-radius: 14px;
            backdrop-filter: blur(10px);
        }
        .settings-card h3 {
            font-size: 15px;
            color: #38bdf8;
            margin-bottom: 15px;
            border-bottom: 1px solid var(--glass-border);
            padding-bottom: 8px;
        }

    </style>
</head>
<body>

<!-- ================= SIDEBAR KIRI ================= -->
<div class="sidebar">
    <div class="sidebar-top">
        
        <!-- Menu Operasional -->
        <div class="container-box">
            <h1 id="panel-title">Resto Admin</h1>
            <button onclick="bukaHalaman('/resto/page/kasir', true, this)"><i class="fa-solid fa-cash-register"></i> Buka Kasir</button>
            <button onclick="bukaHalaman('/resto/page/kasir-monitor', false, this)"><i class="fa-solid fa-desktop"></i> Monitor Kasir</button>
            <button class="admin-only" onclick="bukaHalaman('/resto/page/laporan-harian', true, this)"><i class="fa-solid fa-chart-line"></i> Laporan Harian</button>
            <button class="admin-only" onclick="bukaHalaman('/resto/page/analisa-menu', true, this)"><i class="fa-solid fa-fire"></i> Analisa Menu</button>
            <button class="admin-only" onclick="bukaHalaman('/resto/page/riwayat', true, this)"><i class="fa-solid fa-clock-rotate-left"></i> Riwayat Pembelian</button>
        </div>

        <!-- Link Menu Pelanggan -->
      <div class="container-box">
            <h3>Link Menu Pelanggan</h3>
            <input type="text" id="linkMenuSaya" readonly>
            <button onclick="copyLink()" style="background: #d97706;"><i class="fa-solid fa-copy"></i> Salin Link</button>
        </div>

        <!-- Tombol Menu Pengaturan Utama -->
        <div class="container-box admin-only">
            <button onclick="tampilkanHalamanPengaturan()" style="background: #0284c7; padding: 12px; font-size: 14px;"><i class="fa-solid fa-gear"></i> Pengaturan Toko & Sistem</button>
        </div>

    </div>

    <div style="padding: 15px; border-top: 1px solid var(--glass-border); background: rgba(15,23,42,0.9);">
        <button class="logout-btn" onclick="logout()"><i class="fa-solid fa-right-from-bracket"></i> Keluar (Logout)</button>
    </div>
</div>

<!-- ================= KANAN: AREA TAMPILAN UTAMA ================= -->
<div class="main-content">
    <div id="content-area" class="welcome-placeholder">
        <i class="fa-solid fa-store"></i>
        <h2>Selamat Datang di Panel Resto Admin</h2>
        <p>Silakan pilih menu operasional atau buka Pengaturan Toko di sebelah kiri.</p>
    </div>
</div>

<!-- TEMPLATE FORM PENGATURAN LENGKAP (DIMUAT DI SEBELAH KANAN) -->
<template id="template-pengaturan">
    <div class="settings-container">
        <h2 style="color: #fff; margin-bottom: 20px;"><i class="fa-solid fa-gear"></i> Pusat Pengaturan Toko & Sistem</h2>
        <div class="settings-grid">
            
            <!-- Update Lokasi GPS -->
            <div class="settings-card">
                <h3><i class="fa-solid fa-location-dot"></i> Titik Lokasi GPS Resto</h3>
                <button onclick="simpanLokasiResto()" style="background: #0284c7; margin-bottom: 15px;"><i class="fa-solid fa-location-crosshairs"></i> Ambil GPS Otomatis (Saat Ini)</button>
                <label>Latitude</label>
                <input type="text" id="inputLat" placeholder="Contoh: -6.123456">
                <label>Longitude</label>
                <input type="text" id="inputLon" placeholder="Contoh: 106.123456">
                <button onclick="simpanLokasiManual()" style="background: #0369a1; margin-top: 8px;"><i class="fa-solid fa-floppy-disk"></i> Simpan GPS Manual</button>
            </div>

            <!-- Jangkauan Radius -->
            <div class="settings-card">
                <h3><i class="fa-solid fa-ruler"></i> Batas Radius Pesanan (KM)</h3>
                <label>Jarak Maksimal Pelanggan Order</label>
                <input type="number" id="inputRadius" placeholder="Contoh: 5" value="5">
                <button onclick="simpanRadius()" style="background: #475569; margin-top: 10px;"><i class="fa-solid fa-check"></i> Simpan Radius Jarak</button>
            </div>

            <!-- Kontak WhatsApp -->
            <div class="settings-card">
                <h3><i class="fa-brands fa-whatsapp"></i> Kontak WhatsApp Resto</h3>
                <label>Nomor WhatsApp Admin/Kasir</label>
                <input type="text" id="nomorWaInput" placeholder="Contoh: 628123456789">
                <button onclick="saveNomorWa()" style="background: #16a34a; margin-top: 10px;"><i class="fa-solid fa-floppy-disk"></i> Simpan Nomor WhatsApp</button>
            </div>

            <!-- Ganti Password -->
            <div class="settings-card">
                <h3><i class="fa-solid fa-key"></i> Ganti Password Kasir/Admin</h3>
                <label>Password Lama</label>
                <input type="password" id="passLama" placeholder="Password lama">
                <label>Password Baru</label>
                <input type="password" id="passBaru" placeholder="Password baru">
                <button onclick="prosesGantiPassword()" style="background: #16a34a; margin-top: 10px;"><i class="fa-solid fa-shield-halved"></i> Simpan Password Baru</button>
            </div>

            <!-- Midtrans Payment -->
            <div class="settings-card">
                <h3><i class="fa-solid fa-credit-card"></i> Konfigurasi Midtrans</h3>
                <form onsubmit="simpanMidtrans(event)">
                    <label>Server Key</label>
                    <input type="text" id="serverKeyInput" placeholder="SB-Mid-server-xxxxxx" required>
                    <label>Client Key</label>
                    <input type="text" id="clientKeyInput" placeholder="SB-Mid-client-xxxxxx" required>
                    <button type="submit" style="background: linear-gradient(135deg, #10b981, #059669); margin-top: 10px;"><i class="fa-solid fa-floppy-disk"></i> Simpan Kunci Midtrans</button>
                </form>
            </div>

            <!-- Konfigurasi Dapur -->
            <div class="settings-card">
                <h3><i class="fa-solid fa-print"></i> Konfigurasi Dapur</h3>
                <div style="display: flex; align-items: center; gap: 10px; margin: 15px 0;">
                    <input type="checkbox" id="toggle-auto-print" style="width: 20px; height: 20px; margin: 0;"> 
                    <label for="toggle-auto-print" style="margin: 0; color: #fff; font-size: 13px; cursor: pointer;">Aktifkan Auto Print Dapur</label>
                </div>
                <button onclick="savePrinterSettings()" style="background: #475569;"><i class="fa-solid fa-floppy-disk"></i> Simpan Pengaturan Printer</button>
            </div>

        </div>
    </div>
</template>

<script>
window.onload = async function() {
    const restoId = localStorage.getItem('restoId');
    const userRole = localStorage.getItem('userRole');

    if (userRole === 'kasir') {
        document.querySelectorAll('.admin-only').forEach(el => el.classList.add('hidden'));
        const titleEl = document.getElementById('panel-title');
        if (titleEl) titleEl.innerText = 'Panel Kasir';
    }

    // Sekarang kasir juga bisa mengambil dan menampilkan link menu pelanggan
    if (restoId) {
        try {
            const response = await fetch(`/resto/get-token-unik?restoId=${restoId}`);
            const data = await response.json();
            if (data && data.tokenUnik) {
                document.getElementById('linkMenuSaya').value = `${window.location.origin}/resto?token=${data.tokenUnik}`;
            } else {
                document.getElementById('linkMenuSaya').value = `${window.location.origin}/resto?restoId=${restoId}`;
            }
        } catch (e) {
            console.error("Gagal memuat token", e);
        }
    }
};

// Fungsi Membuka Halaman di Sisi Kanan (Iframe)
async function bukaHalaman(url, butuhVerifikasi, elementBtn) {
    const restoId = localStorage.getItem('restoId');

    if (butuhVerifikasi) {
        const password = prompt("Masukkan Password Karyawan:");
        if (!password) return;
         
        try {
            const res = await fetch('/resto/verifikasi_karyawan', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ 
                    username: 'kasir', 
                    password: password, 
                    restoId: restoId 
                })
            });

            const data = await res.json();

            if (!res.ok || data.status === 'error' || data.success === false) {
                alert("Password Salah! Akses ditolak.");
                return;
            }
        } catch (err) {
            console.error("Gagal verifikasi:", err);
            alert("Terjadi kesalahan koneksi saat memverifikasi password.");
            return;
        }

        if (url.includes('riwayat')) {
            sessionStorage.setItem('sudahLoginRiwayat_' + restoId, 'true');
        } else {
            sessionStorage.setItem('aksesDiberikan', 'true');
        }
    }

    const targetUrl = `${url}?restoId=${restoId}`;

    // CEK PERANGKAT: Jika di HP (lebar layar <= 768px), buka tab baru!
    if (window.innerWidth <= 768) {
        window.open(targetUrl, '_blank');
        return; // Berhenti di sini agar tidak memuat iframe di dashboard
    }

    // Jika di Desktop, jalankan normal menggunakan iframe di sebelah kanan
    document.querySelectorAll('.sidebar-top button').forEach(b => b.style.borderColor = 'var(--glass-border)');
    if(elementBtn) elementBtn.style.borderColor = '#38bdf8';

    const contentArea = document.getElementById('content-area');
    contentArea.innerHTML = `<iframe src="${targetUrl}" class="content-frame"></iframe>`;
}
// Fungsi Menampilkan Menu Pengaturan (Aman untuk Desktop & HP)
function bukaWaPelanggan(nomorHP) {
    // Bersihkan nomor dari spasi atau karakter non-angka
    let nomor = nomorHP.replace(/\D/g, ''); 
    
    // Ubah awalan 0 menjadi 62 jika ada
    if (nomor.startsWith('0')) {
        nomor = '62' + nomor.slice(1);
    }

    // Deteksi apakah perangkat yang digunakan adalah HP (Mobile)
    const isMobile = /Android|webOS|iPhone|iPad|iPod|BlackBerry|IEMobile|Opera Mini/i.test(navigator.userAgent);

    let url = "";
    if (isMobile) {
        // Skema khusus agar di HP LANGSUNG membuka aplikasi WhatsApp
        url = `whatsapp://send?phone=${nomor}&text=Halo,%20terkait%20pesanan%20Anda...`;
    } else {
        // Di komputer/desktop tetap menggunakan web API
        url = `https://api.whatsapp.com/send?phone=${nomor}&text=Halo,%20terkait%20pesanan%20Anda...`;
    }

    // Buka URL
    window.open(url, '_blank');
}
function copyLink() {
    const copyText = document.getElementById("linkMenuSaya");
    copyText.select();
    document.execCommand("copy");
    alert("Link berhasil disalin!");
}

async function simpanMidtrans(event) {
    event.preventDefault();
    const restoId = localStorage.getItem('restoId');
    const server_key = document.getElementById('serverKeyInput').value;
    const client_key = document.getElementById('clientKeyInput').value;

    try {
        const response = await fetch('/resto/update-midtrans', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ restoId, server_key, client_key })
        });
        if (response.ok) alert('Kunci Midtrans berhasil disimpan!');
        else alert('Gagal menyimpan kunci Midtrans.');
    } catch (err) {
        alert('Terjadi kesalahan jaringan.');
    }
}

async function prosesGantiPassword() {
    const pLama = document.getElementById('passLama').value;
    const pBaru = document.getElementById('passBaru').value;
    const res = await fetch('/resto/kasir/ganti-password-karyawan', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ passwordLama: pLama, passwordBaru: pBaru, restoId: localStorage.getItem('restoId') })
    });
    if (res.ok) { 
        alert("Password berhasil diganti!"); 
        document.getElementById('passLama').value = '';
        document.getElementById('passBaru').value = '';
    } else { 
        alert("Gagal mengganti password"); 
    }
}

async function saveNomorWa() {
    const restoId = localStorage.getItem('restoId');
    const nomor = document.getElementById('nomorWaInput').value;
    try {
        const response = await fetch('/menu/resto/wa/update', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ restoId: restoId, nomor: nomor })
        });
        if (response.ok) alert("Nomor WhatsApp berhasil disimpan!");
        else alert("Gagal menyimpan.");
    } catch (error) {
        alert("Terjadi kesalahan koneksi.");
    }
}

function logout() { 
    localStorage.clear(); 
    sessionStorage.clear(); 
    window.location.href = '/resto/page/login'; 
}

async function simpanLokasiResto() {
    if (!navigator.geolocation) return alert("Browser tidak mendukung GPS.");
     
    navigator.geolocation.getCurrentPosition(async (position) => {
        const lat = position.coords.latitude;
        const lng = position.coords.longitude;
        const restoId = localStorage.getItem('restoId');

        try {
            const response = await fetch('/menu/update-location', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ restoId, lat: lat, lon: lng })
            });
            if (response.ok) alert("Lokasi GPS otomatis berhasil disimpan!");
            else alert("Gagal menyimpan lokasi.");
        } catch (error) {
            alert("Gagal mengirim data lokasi.");
        }
    }, () => alert("Harap izinkan akses lokasi!"));
}

async function simpanLokasiManual() {
    const lat = document.getElementById('inputLat').value; 
    const lon = document.getElementById('inputLon').value; 
    const restoId = localStorage.getItem('restoId');

    if (!lat || !lon) return alert("Harap masukkan Latitude dan Longitude!");

    try {
        const response = await fetch('/menu/update-location', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ restoId, lat: parseFloat(lat), lon: parseFloat(lon) })
        });
        if (response.ok) alert("Lokasi manual berhasil disimpan!");
        else alert("Gagal menyimpan lokasi manual.");
    } catch (error) {
        alert("Terjadi kesalahan koneksi.");
    }
}

async function simpanRadius() {
    const radius = document.getElementById('inputRadius').value;
    const restoId = localStorage.getItem('restoId');
    const res = await fetch('/menu/resto/radius/update', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ restoId, radius })
    });
    if (res.ok) alert("Radius jangkauan berhasil diperbarui!");
}

async function loadDashboardSettings() {
    const restoId = localStorage.getItem('restoId') || 1;
    try {
        const response = await fetch(`/api/printer/settings?resto_id=${restoId}`);
        const data = await response.json();
        if (data && document.getElementById('toggle-auto-print')) {
            document.getElementById('toggle-auto-print').checked = data.auto_print;
        }
    } catch(e) {
        console.error("Gagal load setting printer");
    }
}

async function savePrinterSettings() {
    const isAutoPrint = document.getElementById('toggle-auto-print').checked;
    const restoId = localStorage.getItem('restoId') || 1;
    const res = await fetch('/api/printer/settings', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ resto_id: restoId, auto_print: isAutoPrint })
    });
    if (res.ok) alert('Pengaturan printer berhasil disimpan!');
}
</script>
</body>
</html>

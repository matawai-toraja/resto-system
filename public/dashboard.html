<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard Resto</title>
    <style>
        :root {
            --bg-gradient: linear-gradient(135deg, #0f172a 0%, #1e1b4b 50%, #311042 100%);
            --glass-card: rgba(255, 255, 255, 0.05);
            --glass-border: rgba(255, 255, 255, 0.08);
            --text-primary: #f8fafc;
            --text-secondary: #94a3b8;
        }

        body { 
            font-family: 'Segoe UI', sans-serif; 
            background: var(--bg-gradient); 
            background-attachment: fixed;
            min-height: 100vh; 
            margin: 0; 
            padding: 20px; 
            display: flex; 
            justify-content: center; 
            align-items: flex-start; 
            flex-wrap: wrap; 
            gap: 20px; 
            color: var(--text-primary);
        }

        .container { 
            background: var(--glass-card); 
            padding: 30px; 
            border-radius: 20px; 
            backdrop-filter: blur(20px); 
            border: 1px solid var(--glass-border);
            text-align: center; 
            color: var(--text-primary); 
            width: 300px; 
            box-shadow: 0 10px 25px rgba(0,0,0,0.3);
        }

        button { 
            display: block; 
            width: 100%; 
            color: white; 
            padding: 12px; 
            margin: 8px 0; 
            background: rgba(255, 255, 255, 0.1); 
            border: none; 
            border-radius: 10px; 
            cursor: pointer; 
            font-weight: 600;
            transition: background 0.2s;
        }

        button:hover {
            opacity: 0.9;
        }

        input { 
            width: 100%; 
            padding: 10px; 
            margin: 5px 0; 
            border-radius: 5px; 
            border: 1px solid var(--glass-border); 
            background: rgba(255, 255, 255, 0.05);
            color: var(--text-primary);
            box-sizing: border-box; 
            outline: none;
        }

        input::placeholder {
            color: var(--text-secondary);
        }

        input[type="text"]#linkMenuSaya {
            color: black !important; 
            font-weight: bold;
        }

        .logout-btn { background: rgba(255, 0, 0, 0.3); margin-top: 10px; }

        h1, h3, label {
            color: var(--text-primary);
        }
    </style>
</head>
<body>

<div class="container">
    <h1>Resto Admin</h1>
    <button onclick="verifikasiLaluBuka('/resto/page/kasir')">Buka Kasir</button>
    <button onclick="verifikasiLaluBuka('/resto/page/kasir-monitor')">Monitor Kasir</button>
    <button onclick="verifikasiLaluBuka('/resto/page/laporan-harian')">Laporan Harian</button>
    <button onclick="verifikasiLaluBuka('/resto/page/analisa-menu')">Analisa Menu</button>
    <button onclick="verifikasiLaluBuka('/resto/page/riwayat')">Riwayat Pembelian</button>
    <button class="logout-btn" onclick="logout()">Keluar (Logout)</button>
</div>

<div class="container">
    <h3>Link Menu Pelanggan</h3>
    <input type="text" id="linkMenuSaya" readonly style="color: black; font-weight: bold;">
    <button onclick="copyLink()" style="background: #e67e22; margin-bottom: 20px;">Salin Link</button>
    <button onclick="simpanLokasiResto()" style="background: #3498db; margin-top: 10px;">Update Titik GPS Resto</button>
    <h3>Update Lokasi Resto</h3>
    <input type="text" id="inputLat" placeholder="Latitude (Contoh: -6.123456)">
    <input type="text" id="inputLon" placeholder="Longitude (Contoh: 106.123456)">
    <button onclick="simpanLokasiManual()" style="background: #3498db;">Simpan GPS Manual</button>
    <button onclick="simpanLokasiResto()" style="background: #2980b9; margin-top: 5px;">Gunakan GPS Otomatis</button>
     
    <h3>Atur Jarak Maksimal (KM)</h3>
    <input type="number" id="inputRadius" placeholder="Contoh: 5" value="5">
    <button onclick="simpanRadius()">Simpan Radius Jarak</button>

    <h3>Pengaturan Kontak</h3>
    <input type="text" id="nomorWaInput" placeholder="Masukkan nomor WhatsApp">
    <button onclick="saveNomorWa()" style="background: #27ae60;">Simpan Nomor WhatsApp</button>
</div>

<div class="container">
    <h3>Ganti Password Akses</h3>
    <input type="password" id="passLama" placeholder="Password Lama">
    <input type="password" id="passBaru" placeholder="Password Baru">
    <button onclick="prosesGantiPassword()" style="background:#27ae60;">Simpan Password Baru</button>
</div>

<div class="container">
    <h3>Konfigurasi Dapur</h3>
    <input type="checkbox" id="toggle-auto-print"> Auto Print
    <button onclick="savePrinterSettings()">Simpan Pengaturan</button>
</div>

<script>
    window.onload = async function() {
        const restoId = localStorage.getItem('restoId');
        if (restoId) {
            try {
                // Menggunakan endpoint baru yang bebas bentrok
                const response = await fetch(`/resto/get-token-unik?restoId=${restoId}`);
                const data = await response.json();
                 
                if (data && data.tokenUnik) {
                    const link = `${window.location.origin}/resto?token=${data.tokenUnik}`;
                    document.getElementById('linkMenuSaya').value = link;
                } else {
                    document.getElementById('linkMenuSaya').value = `${window.location.origin}/resto?restoId=${restoId}`;
                }
            } catch (e) {
                console.error("Gagal memuat token unik", e);
            }
        }
        loadDashboardSettings();
    };

    function copyLink() {
        const copyText = document.getElementById("linkMenuSaya");
        copyText.select();
        document.execCommand("copy");
        alert("Link berhasil disalin!");
    }

    async function prosesGantiPassword() {
        const pLama = document.getElementById('passLama').value;
        const pBaru = document.getElementById('passBaru').value;
        const res = await fetch('/resto/kasir/ganti-password-karyawan', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ passwordLama: pLama, passwordBaru: pBaru, restoId: localStorage.getItem('restoId') })
        });
        if (res.ok) { alert("Password berhasil diganti!"); sessionStorage.removeItem('aksesDiberikan'); }
        else { alert("Gagal mengganti password"); }
    }

    async function verifikasiLaluBuka(url) {
    const password = prompt("Masukkan Password Karyawan:");
    if (!password) return;
     
    const restoId = localStorage.getItem('restoId');
    const res = await fetch('/resto/verifikasi-karyawan', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ password: password, restoId: restoId })
    });
     
    if (res.ok) { 
        // Jika tujuannya ke riwayat, set session khusus riwayat
        if (url.includes('riwayat')) {
            sessionStorage.setItem('sudahLoginRiwayat_' + restoId, 'true');
        } else {
            sessionStorage.setItem('aksesDiberikan', 'true'); 
        }
        window.location.href = url; 
    }
    else { 
        alert("Password Salah!"); 
    }
}
    // FUNGSI WA: MURNI MENYIMPAN KE DATABASE SAJA
    async function saveNomorWa() {
        const restoId = localStorage.getItem('restoId');
        const nomor = document.getElementById('nomorWaInput').value;
        try {
            const response = await fetch('/menu/resto/wa/update', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ restoId: restoId, nomor: nomor })
            });
            if (response.ok) alert("Nomor WhatsApp berhasil disimpan!");
            else alert("Gagal menyimpan.");
        } catch (error) {
            alert("Terjadi kesalahan koneksi.");
        }
    }

    function logout() { localStorage.clear(); sessionStorage.clear(); window.location.href = '/resto/page/login'; }

    async function simpanLokasiResto() {
    if (!navigator.geolocation) return alert("Browser tidak mendukung GPS.");
     
    navigator.geolocation.getCurrentPosition(async (position) => {
        const lat = position.coords.latitude;
        const lng = position.coords.longitude;
        const restoId = localStorage.getItem('restoId');

        try {
            const response = await fetch('/menu/update-location', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ restoId, lat: lat, lon: lng })
            });

            if (response.ok) {
                alert("Lokasi Resto berhasil disimpan!");
            } else {
                alert("Gagal menyimpan lokasi.");
            }
        } catch (error) {
            alert("Gagal mengirim data lokasi.");
        }
    }, () => alert("Harap izinkan akses lokasi!"));
}// 1. Fungsi untuk Simpan GPS Manual
async function simpanLokasiManual() {
    const lat = document.getElementById('inputLat').value; // Pastikan ID input di HTML adalah 'inputLat'
    const lon = document.getElementById('inputLon').value; // Pastikan ID input di HTML adalah 'inputLon'
    const restoId = localStorage.getItem('restoId');

    if (!lat || !lon) {
        alert("Harap masukkan Latitude dan Longitude!");
        return;
    }

    try {
        const response = await fetch('/menu/update-location', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ restoId, lat: parseFloat(lat), lon: parseFloat(lon) })
        });

        if (response.ok) {
            alert("Lokasi manual berhasil disimpan!");
        } else {
            alert("Gagal menyimpan lokasi manual.");
        }
    } catch (error) {
        alert("Terjadi kesalahan koneksi ke server.");
    }
}
    async function simpanRadius() {
        const radius = document.getElementById('inputRadius').value;
        const restoId = localStorage.getItem('restoId');
        const res = await fetch('/menu/resto/radius/update', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ restoId, radius })
        });
        if (res.ok) alert("Radius jangkauan berhasil diperbarui!");
    }

    async function loadDashboardSettings() {
        const restoId = localStorage.getItem('restoId') || 1;
        const response = await fetch(`/api/printer/settings?resto_id=${restoId}`);
        const data = await response.json();
        if (data) document.getElementById('toggle-auto-print').checked = data.auto_print;
    }

    async function savePrinterSettings() {
        const isAutoPrint = document.getElementById('toggle-auto-print').checked;
        const restoId = localStorage.getItem('restoId') || 1;
        const res = await fetch('/api/printer/settings', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ resto_id: restoId, auto_print: isAutoPrint })
        });
        if (res.ok) alert('Pengaturan berhasil disimpan!');
    }
</script>
</body>
</html>

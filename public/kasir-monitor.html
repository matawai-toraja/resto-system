<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <title>Monitor Kasir Profesional</title>
    <style>
        body { background-color: #121212 !important; color: #ffffff; font-family: 'Segoe UI', sans-serif; padding: 20px; }
        #container-monitor { display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap: 20px; }
        
        .card { background: #1e1e1e; border-radius: 12px; padding: 15px; color: white; transition: 0.3s; box-shadow: 0 4px 6px rgba(0,0,0,0.3); }
        
        /* Penanda Status Dapur dengan garis kiri */
        .status-menunggu { border-left: 10px solid #ff4d94; } 
        .status-diproses { border-left: 10px solid #f39c12; }
        .status-disajikan { border-left: 10px solid #2ecc71; }
        
        button { background: #3498db; color: white; border: none; padding: 10px; border-radius: 5px; cursor: pointer; font-weight: bold; width: 100%; margin-top: 5px; }
        button:hover { background: #2980b9; }
        .btn-batal { background: #e74c3c; }
    </style>
</head>
<body>

    <button id="btn-aktifkan-audio" onclick="aktifkanAudio()" style="position:fixed; top:20px; right:20px; width:auto; background:#f39c12; color:white; z-index:9999;">🔔 Aktifkan Notifikasi</button>
    
    <h1>Daftar Pesanan</h1>
    <div id="container-monitor">Memuat data...</div>
<script>
let lastOrderIds = [];
const audio = new Audio('/notif.mp3'); 
let audioAktif = false;
let currentPesanan = { id: null, total: 0 };
let restoPrinterConfig = { auto_print: 0 };
// 1. Fungsi Aktifkan Audio (Wajib diklik sekali oleh kasir)
function aktifkanAudio() {
    audio.play().then(() => {
        audio.pause();
        audio.currentTime = 0;
        audioAktif = true;
        document.getElementById('btn-aktifkan-audio').style.display = 'none';
        alert("Notifikasi suara berhasil diaktifkan!");
    }).catch(e => {
        console.error("Gagal mengaktifkan audio:", e);
        alert("Gagal mengaktifkan audio. Pastikan file /notif.mp3 ada di folder public.");
    });
}
async function loadPrinterConfig() {
    const restoId = localStorage.getItem('restoId');
    const token = localStorage.getItem('authKey');
    if (!restoId || !token) return;

    try {
        const res = await fetch(`/resto/printer-settings?restoId=${restoId}`, {
            headers: { 'Authorization': 'Bearer ' + token }
        });
        if (res.ok) {
            const data = await res.json();
            if (data) {
                restoPrinterConfig = data; // Menyimpan status auto_print (0 atau 1)
            }
        }
    } catch (err) {
        console.error("Gagal memuat config printer:", err);
    }
}
function cetakStruk(id, meja, nama, pesananStr, total, metode) {
    let displayNamaResto = localStorage.getItem('namaResto') || 'Resto';
    let items = [];
    try { items = typeof pesananStr === 'string' ? JSON.parse(pesananStr) : pesananStr; } catch(e) {}
    
    let printWindow = window.open('', '_blank', 'width=400,height=600');
    printWindow.document.write(`
        <html>
        <head><title>Struk Pembayaran #${id}</title></head>
        <body style="font-family: monospace; padding: 15px; font-size: 12px; color: #000;">
            <h3 style="text-align:center; margin-bottom:2px;">${displayNamaResto}</h3>
            <p style="text-align:center; margin-top:0; font-size: 10px;">Struk Pembayaran Resmi</p>
            <hr style="border: 0.5px dashed #000;">
            <p><b>Order ID:</b> #${id}<br><b>Meja:</b> ${meja}<br><b>Pelanggan:</b> ${nama}<br><b>Metode:</b> ${metode}</p>
            <hr style="border: 0.5px dashed #000;">
            <ul style="padding-left: 0; list-style: none;">
                ${items.map(i => `<li style="display: flex; justify-content: space-between; margin-bottom: 4px;">
                    <span>${i.nama} x${i.jumlah}</span>
                    <span>Rp ${(Number(i.harga || 0) * Number(i.jumlah || 1)).toLocaleString('id-ID')}</span>
                </li>`).join('')}
            </ul>
            <hr style="border: 0.5px dashed #000;">
            <p style="font-size: 14px; text-align: right;"><b>Total: Rp ${Number(total).toLocaleString('id-ID')}</b></p>
            <hr style="border: 0.5px dashed #000;">
            <p style="text-align:center; margin-top:15px; font-size: 11px;">Terima Kasih Atas Kunjungan Anda!</p>
            <script>window.print(); setTimeout(() => window.close(), 500);<\/script>
        </body>
        </html>
    `);
    printWindow.document.close();
}
function cetakDapur(id, meja, nama, pesananStr) {
    let items = [];
    try { items = typeof pesananStr === 'string' ? JSON.parse(pesananStr) : pesananStr; } catch(e) {}
    
    // Perbaikan: gunakan window.open agar jendela baru terbuka dengan benar
    let printWindow = window.open('', '_blank', 'width=400,height=600');
    
    printWindow.document.write(`
        <html>
        <head><title>Struk Dapur #${id}</title></head>
        <body style="font-family: monospace; padding: 10px;">
            <h3 style="text-align:center; margin-bottom:5px;">RESEP DAPUR</h3>
            <p><b>Order ID:</b> #${id}<br><b>Meja:</b> ${meja}<br><b>Pemesan:</b> ${nama}</p>
            <hr>
            <ul style="padding-left: 15px;">
                ${items.map(i => `<li><b>${i.nama}</b> (x${i.jumlah})</li>`).join('')}
            </ul>
            <hr>
            <p style="text-align:center; font-size:0.8em;">Harap Segera Disiapkan!</p>
            <script>window.print(); setTimeout(() => window.close(), 500);<\/script>
        </body>
        </html>
    `);
    printWindow.document.close();
}
// 2. Fungsi Utama Load Pesanan & Deteksi Suara Otomatis
function loadPesanan() {
    const token = localStorage.getItem('authKey');
    const restoId = localStorage.getItem('restoId');

    if (!token) {
        console.error("User belum login.");
        window.location.href = '/resto/page/login'; 
        return;
    }

    if (!restoId) {
        console.error("Resto ID tidak ditemukan di sesi.");
        return;
    }

    fetch(`/resto/kasir/cek-status-pesanan?restoId=${restoId}`, {
        method: 'GET',
        headers: { 
            'Authorization': 'Bearer ' + token,
            'Content-Type': 'application/json'
        }
    })
    .then(res => {
        if (res.status === 401) throw new Error("Sesi habis");
        return res.json();
    })
    .then(data => {
        const listData = Array.isArray(data) ? data.reverse() : [];
        const currentIds = listData.map(p => p.id);
        
        // Deteksi pesanan baru untuk membunyikan alarm
        if (lastOrderIds.length > 0) {
            const adaPesananBaru = currentIds.some(id => !lastOrderIds.includes(id));
            if (adaPesananBaru && audioAktif) {
                audio.currentTime = 0;
                audio.play().catch(err => console.log("Audio dicegah browser:", err));
            }
        }
        
        lastOrderIds = currentIds;
        renderPesanan(listData);
    })
    .catch(err => {
        console.error("Error Fetch:", err);
    });
}

// 3. Render Kartu Pesanan ke Layar Monitor
function renderPesanan(data) {
    const container = document.getElementById('container-monitor');
    if (!container) return;

    // Filter agar pesanan yang sudah berstatus 'selesai' atau 'dibatalkan' tidak muncul lagi di monitor utama
    const dataAktif = data.filter(p => p.statusDapur !== 'selesai' && p.statusDapur !== 'dibatalkan');

    if (dataAktif.length === 0) {
        container.innerHTML = "<p>Belum ada pesanan aktif.</p>";
        return;
    }

    container.innerHTML = dataAktif.map(p => {
        let items = [];
        try {
            items = typeof p.pesanan === 'string' ? JSON.parse(p.pesanan) : (p.pesanan || []);
        } catch(e) { items = []; }
        
        let status = p.statusDapur || 'menunggu';
        let isLunas = p.statusPembayaran === 'lunas';
        let totalHarga = items.reduce((sum, i) => sum + (Number(i.harga || 0) * Number(i.jumlah || 1)), 0);
        let metode = (p.metodePembayaran) ? p.metodePembayaran.toUpperCase() : 'TUNAI'; 
        let warnaMetode = (metode === 'DIGITAL') ? '#3498db' : '#f39c12';
        
        // Pengelompokan Tombol Aksi agar tidak menumpuk
        let tombolAksi = '';

        if (status === 'menunggu') {
            tombolAksi = `
                <button onclick="updateStatus(${p.id}, 'diproses', ${JSON.stringify(items).replace(/"/g, '&quot;')}, '${p.meja}', '${p.nama || 'Pelanggan'}')" style="background:#3498db;">PROSES MASAK</button>
                <button onclick="batalkanPesanan(${p.id})" style="background:#e74c3c;">BATALKAN</button>
            `;
        } else if (status === 'diproses') {
            tombolAksi = `
                <button onclick="updateStatus(${p.id}, 'disajikan')" style="background:#2ecc71;">SIAP SAJIKAN</button>
                <button onclick="batalkanPesanan(${p.id})" style="background:#e74c3c;">BATALKAN</button>
            `;
        } else if (status === 'disajikan') {
            if (!isLunas) {
                if (metode === 'DIGITAL') {
                    tombolAksi = `
                        <div style="display:flex; gap:5px;">
                            <button onclick="bukaModal(${p.id}, ${totalHarga})" style="background:#3498db; flex:1;">KONFIRMASI DIGITAL</button>
                        </div>
                    `;
                } else {
                    tombolAksi = `
                        <button onclick="bukaModal(${p.id}, ${totalHarga})" style="background:#f39c12;">KONFIRMASI TUNAI</button>
                    `;
                }
            } else {
                // Jika sudah disajikan dan sudah lunas, tampilkan tombol cetak struk & tombol Selesai/Arsip agar hilang dari monitor & masuk laporan
                tombolAksi = `
                    <button onclick="cetakStruk(${p.id}, '${p.meja}', '${p.nama || 'Pelanggan'}', ${JSON.stringify(items).replace(/"/g, '&quot;')}, ${totalHarga}, '${metode}')" style="background:#27ae60;">🖨️ CETAK STRUK</button>
                    <button onclick="selesaikanPesanan(${p.id})" style="background:#8e44ad;">✅ SELESAI & MASUK LAPORAN</button>
                `;
            }
        }

        return `
            <div class="card status-${status}">
                <div style="border-bottom: 1px solid #333; padding-bottom: 8px; margin-bottom: 10px;">
                    <b>#${p.id} - ${p.nama || 'Pelanggan'}</b> | Meja: ${p.meja || '-'}
                </div>
                <ul>${items.map(i => `<li>${i.nama} <b>x${i.jumlah}</b></li>`).join('')}</ul>
                <div style="font-size: 0.9em;">
                    <p>Total: <b>Rp ${totalHarga.toLocaleString('id-ID')}</b></p>
                    <p>Bayar: <b style="color:${warnaMetode}">${metode}</b> | Status: <b>${isLunas ? 'LUNAS' : 'BELUM BAYAR'}</b></p>
                </div>
                <div style="display:flex; flex-direction:column; gap:5px; margin-top:10px;">
                    <button onclick="cetakDapur(${p.id}, '${p.meja}', '${p.nama || 'Pelanggan'}', ${JSON.stringify(items).replace(/"/g, '&quot;')})" style="background:#e67e22; font-size:0.85em;">🖨️ CETAK RESEP DAPUR</button>
                    ${tombolAksi}
                </div>
            </div>`;
    }).join('');
}
async function selesaikanPesanan(id) {
    const token = localStorage.getItem('authKey');
    try {
        const response = await fetch(`/resto/kasir/selesai`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + token },
            body: JSON.stringify({ id })
        });
        if (response.ok) {
            loadPesanan();
        } else {
            alert("Gagal memasukkan data ke riwayat laporan.");
        }
    } catch(err) {
        console.error("Error penyelesaian:", err);
    }
}
async function batalkanPesanan(id) {
    if (!confirm("Yakin ingin membatalkan pesanan ini?")) return;
    const token = localStorage.getItem('authKey');
    try {
        const response = await fetch(`/resto/kasir/update-dapur`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + token },
            body: JSON.stringify({ id, statusDapur: 'dibatalkan' })
        });
        if (response.ok) {
            loadPesanan();
        } else {
            alert("Gagal membatalkan pesanan.");
        }
    } catch(err) {
        console.error("Error pembatalan:", err);
    }
}
// 4. Fungsi Modal & Aksi Tombol
function bukaModal(id, total) {
    currentPesanan = { id, total };
    document.getElementById('total-harga-display').innerText = total.toLocaleString('id-ID');
    document.getElementById('modal-bayar').style.display = 'block';
}

async function prosesBayar(metode) {
    const token = localStorage.getItem('authKey');
    const uangInput = document.getElementById('input-uang').value;
    const uang = Number(uangInput.replace(/[^0-9]/g, ''));

    try {
        const response = await fetch(`/menu/selesaikan/${currentPesanan.id}`, { 
            method: 'POST', 
            headers: { 
                'Content-Type': 'application/json',
                'Authorization': 'Bearer ' + token 
            }, 
            body: JSON.stringify({ metode, uangBayar: metode === 'tunai' ? uang : currentPesanan.total }) 
        });

        if (response.ok) {
            document.getElementById('modal-bayar').style.display = 'none';
            document.getElementById('input-uang').value = '';
            loadPesanan();
        } else {
            alert("Gagal memproses pembayaran.");
        }
    } catch(err) {
        console.error("Error pembayaran:", err);
    }
}

async function updateStatus(id, statusDapur, pesananData, mejaPelanggan, namaPelanggan) {
    const token = localStorage.getItem('authKey');
    try {
        const response = await fetch(`/resto/kasir/update-dapur`, { 
            method: 'POST', 
            headers: { 
                'Content-Type': 'application/json', 
                'Authorization': 'Bearer ' + token 
            }, 
            body: JSON.stringify({ id, statusDapur }) 
        });

        if (response.ok) {
            // JIKA AUTO PRINT AKTIF (angka 1 di database) DAN status diubah ke 'diproses' (Proses Masak)
            if (restoPrinterConfig.auto_print == 1 && statusDapur === 'diproses') {
                cetakDapur(id, mejaPelanggan, namaPelanggan, pesananData);
            }
            loadPesanan();
        } else {
            alert("Gagal memperbarui status dapur.");
        }
    } catch(err) {
        console.error("Error update status:", err);
    }
}

// 5. Jalankan Auto-Refresh setiap 3 detik
setInterval(loadPesanan, 3000);
loadPesanan();
</script>
<div id="modal-bayar" style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.8); z-index:1000;">
    <div style="background:#1e1e1e; width:300px; margin:100px auto; padding:20px; border-radius:10px; text-align:center;">
        <h3>Konfirmasi Pembayaran</h3>
        <p>Total: <span id="total-harga-display">0</span></p>
        <input type="number" id="input-uang" placeholder="Masukkan jumlah uang (jika tunai)" style="width:90%; padding:8px; margin-bottom:10px;">
        <div style="display:flex; gap:10px;">
            <button onclick="prosesBayar('tunai')" style="background:#f39c12;">TUNAI</button>
            <button onclick="prosesBayar('digital')" style="background:#3498db;">DIGITAL</button>
        </div>
        <button onclick="document.getElementById('modal-bayar').style.display='none'" style="background:#e74c3c; margin-top:10px;">BATAL</button>
    </div>
</div>
</body>
</html>

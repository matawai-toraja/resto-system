<!DOCTYPE html>
<html lang="id">
<head>
<script src="https://cdn.socket.io/4.5.4/socket.io.min.js"></script>
<script>
  const socket = io(); 

  socket.on('pesanan_baru', (data) => {
      console.log("Pesanan baru diterima:", data);
  });
</script>
    <meta charset="UTF-8">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">
    <title>Monitor Kasir</title>
    <style>


body {
    background: linear-gradient(135deg, #a1c4fd 0%, #c2e9fb 100%) !important;
    background-attachment: fixed;
    min-height: 100vh;
    padding: 20px;
    margin: 0;
    color: #333;
}

/* Kartu dengan efek Kaca (Glassmorphism) 3D */
.card {
    /* Background semi-transparan putih */
    background: rgba(255, 255, 255, 0.4) !important;
    
    /* Efek Blur Kaca */
    backdrop-filter: blur(15px);
    -webkit-backdrop-filter: blur(15px);
    
    /* Border untuk mempertegas kesan kaca */
    border: 1px solid rgba(255, 255, 255, 0.5);
    
    /* Bayangan untuk kesan 3D (Timbul) */
    box-shadow: 0 8px 32px 0 rgba(31, 38, 135, 0.2);
    
    border-radius: 25px;
    padding: 20px;
    margin-bottom: 20px;
    transition: transform 0.3s ease;
}

/* Warna Kartu (Pesanan Baru = PINK 3D) */
/* Kita gunakan transparansi agar efek kaca tetap terlihat */
.card {
    background: linear-gradient(145deg, rgba(255, 182, 193, 0.6), rgba(255, 105, 180, 0.5)) !important;
}

/* Kartu saat diceklis/Disajikan = PUTIH (Kaca) */
.card.selesai {
    background: rgba(255, 255, 255, 0.6) !important;
    border: 1px solid rgba(255, 255, 255, 0.8);
}
body {
    background-color: #121212 !important; /* Hitam elegan */
    background-image: radial-gradient(circle at 50% 50%, #1e1e1e 0%, #121212 100%);
    color: #ffffff;
    font-family: 'Segoe UI', sans-serif;
    padding: 20px;
}

/* Kartu Dasar (Pesanan Baru = PINK) */
.card {
    background: linear-gradient(145deg, #ff85c1, #ff4d94) !important; /* Warna Pink Eksotif */
    border: none;
    border-radius: 20px;
    padding: 20px;
    margin-bottom: 20px;
    box-shadow: 10px 10px 20px #050505, -5px -5px 10px #2a2a2a; /* Efek 3D */
    color: white !important;
    transition: 0.3s;
}

/* Kartu saat diceklis/Disajikan = PUTIH */
.card.selesai {
    background: #ffffff !important; /* Putih bersih */
    box-shadow: 5px 5px 15px rgba(0,0,0,0.5);
}

/* Paksa teks jadi gelap saat kartu berwarna putih */
.card.selesai, .card.selesai h2, .card.selesai p, .card.selesai span {
    color: #333 !important;
}

/* Tombol agar terlihat lebih 3D */
button {
    border-radius: 10px;
    border: none;
    padding: 8px 16px;
    cursor: pointer;
    box-shadow: 3px 3px 6px rgba(0,0,0,0.3);
    font-weight: bold;
}
        body { font-family: 'Inter', sans-serif; background: #f4f7f6; padding: 20px; color: #2d3436; }
        h1 { text-align: center; color: #1a1a1a; margin-bottom: 25px; }
        #search-box { width: 100%; max-width: 500px; display: block; margin: 20px auto; padding: 18px 25px; border: none; border-radius: 50px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); outline: none; }
        #container-monitor { display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap: 20px; }
        .card { background: #fff8e1; padding: 25px; border-radius: 20px; box-shadow: 0 8px 20px rgba(0,0,0,0.06); border: 2px solid #ffe082; transition: 0.3s; }
        .card.selesai { background: #e8f5e9 !important; border: 2px solid #27ae60 !important; }
        h3 { margin-top: 0; font-size: 1.1em; border-bottom: 1px solid rgba(0,0,0,0.1); padding-bottom: 10px; }
        ul { padding-left: 20px; margin: 15px 0; }
        .btn-container { display: flex; gap: 8px; margin-top: 15px; }
        button { padding: 10px 18px; border: none; border-radius: 10px; cursor: pointer; color: white; font-weight: 600; transition: 0.2s; }
        button:hover { opacity: 0.9; transform: translateY(-2px); }
        #modal-bayar { display: none; position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 90%; max-width: 450px; background: #fff; padding: 30px; border-radius: 25px; box-shadow: 0 20px 50px rgba(0,0,0,0.2); z-index: 999999; }
        #btn-aktifkan { display: block; margin: 0 auto 20px; background: #0984e3; padding: 12px 25px; border-radius: 50px; border: none; color: white; cursor: pointer; }
    </style>
</head>
<body>

    <button id="btn-aktifkan" onclick="aktifkanSuara()">Aktifkan Suara</button>
    <audio id="notif-sound" src="/notif.mp3" preload="auto"></audio>

    <h1>Daftar Pesanan Masuk</h1>
    <input type="text" id="search-box" autofocus onkeyup="filterPesanan()" placeholder="🔍 Cari nama pelanggan atau meja...">
    <div id="container-monitor">Memuat data...</div>

    <div id="modal-bayar">
        <h3 style="color:#333; margin-top:0;">Form Pembayaran</h3>
        <div id="list-items" style="margin: 15px 0; border-bottom: 1px dashed #ccc; padding-bottom: 10px;"></div>
        <p style="font-size: 1.2em; font-weight:bold; color:#333;">Total: Rp <span id="total-tagihan-modal">0</span></p>
        <input type="text" id="input-uang" oninput="formatRupiahInput(this)" placeholder="Input Uang Pelanggan" style="width:100%; padding:15px; box-sizing:border-box; border:1px solid #ccc; border-radius:8px;">
        <div id="info-kembalian" style="margin: 15px 0; font-size: 1.4em; font-weight:bold; color:#27ae60; display:none;">
            Kembali: Rp <span id="nominal-kembalian">0</span>
        </div>
        <div style="display:flex; gap:10px; margin-top:15px;">
            <button onclick="konfirmasiBayar()" style="flex:2; background:#27ae60;">Selesai Pembayaran & Cetak</button>
            <button onclick="tutupModal()" style="flex:1; background:#7f8c8d;">Kembali</button>
        </div>
    </div>

<script>
    const token = localStorage.getItem('authKey');
    const restoId = localStorage.getItem('restoId');
    if (!token) { window.location.href = 'login.html'; }

    let isFirstLoad = true;
    let idBayarSekarang = null;
    let dataPesananSekarang = null;
    let jumlahPesananTerakhir = 0;

    function loadPesanan() {
        fetch(`/resto/kasir/daftar-pesanan?restoId=${restoId}`, { 
            headers: { 'Authorization': 'Bearer ' + token },
            cache: 'no-cache' 
        })
        .then(res => res.json())
        .then(data => {
            if (!isFirstLoad && data.length > jumlahPesananTerakhir) {
                putarNotif();
            }
            jumlahPesananTerakhir = data.length;
            isFirstLoad = false;
            renderPesanan(data.reverse());
            filterPesanan();
        })
        .catch(err => console.error("Gagal ambil data:", err));
    }

    function renderPesanan(data) {
        const container = document.getElementById('container-monitor');
        container.innerHTML = data.map(p => {
            let items = typeof p.pesanan === 'string' ? JSON.parse(p.pesanan) : p.pesanan;
            let total = items.reduce((sum, i) => sum + (Number(i.harga) * Number(i.jumlah)), 0);
            let isPaid = p.status === 'dibayar';
            let isChecked = localStorage.getItem('siap-'+p.id) === 'true';
            let pEncoded = encodeURIComponent(JSON.stringify(p));
            return `
                <div class="card ${isChecked ? 'selesai' : ''}" data-nama="${p.nama.toLowerCase()}" data-meja="${p.meja}">
                    <h3>ID: ${p.id} | Meja: ${p.meja} | ${p.nama}</h3>
                    <label><input type="checkbox" ${isChecked ? 'checked' : ''} onchange="tandaiSiap('${p.id}', this.checked)"> disajikan</label>
                    <ul>${items.map(i => `<li>${i.nama} x ${i.jumlah}</li>`).join('')}</ul>
                    <p><strong>Total: Rp ${total.toLocaleString()}</strong></p>
                    <div class="btn-container">
                        ${!isPaid ? `
                            <button onclick="bukaModal('${p.id}', ${total}, '${pEncoded}')" style="background:#27ae60;">Bayar</button>
                            <button onclick="prosesAksi('${p.id}', 'batal')" style="background:#e67e22;">Batal</button>
                            <button onclick="cetakDapur('${pEncoded}')" style="background:#8e44ad;">Dapur</button>
                        ` : `<button onclick="selesaiPesanan(${p.id})" style="background:#2c3e50;">Selesai</button>`}
                    </div>
                </div>`;
        }).join('');
    }

    function filterPesanan() {
        let filter = document.getElementById('search-box').value.toLowerCase();
        document.querySelectorAll('.card').forEach(card => {
            card.style.display = (card.dataset.nama.includes(filter) || card.dataset.meja.includes(filter)) ? "" : "none";
        });
    }

    function aktifkanSuara() {
        const audio = document.getElementById('notif-sound');
        audio.src = "/notif.mp3";
        audio.play().then(() => {
            const btn = document.getElementById('btn-aktifkan');
            btn.innerText = "Suara Sudah Aktif";
            btn.disabled = true;
            localStorage.setItem('suaraSudahAktif', 'true');
        }).catch(e => console.error(e));
    }

    function putarNotif() {
        const audio = document.getElementById('notif-sound');
        if (audio) {
            audio.currentTime = 0;
            audio.play().catch(e => console.log("Audio diblokir"));
        }
    }

    function tandaiSiap(id, checked) { localStorage.setItem('siap-'+id, checked); loadPesanan(); }
    function bukaModal(id, total, pEncoded) { 
        idBayarSekarang = id; 
        dataPesananSekarang = JSON.parse(decodeURIComponent(pEncoded));
        let items = typeof dataPesananSekarang.pesanan === 'string' ? JSON.parse(dataPesananSekarang.pesanan) : dataPesananSekarang.pesanan;
        document.getElementById('list-items').innerHTML = items.map(i => `<div>${i.nama} x${i.jumlah} <span>Rp ${(i.harga * i.jumlah).toLocaleString()}</span></div>`).join(''); 
        document.getElementById('total-tagihan-modal').innerText = total.toLocaleString(); 
        document.getElementById('modal-bayar').style.display = 'block'; 
        document.getElementById('input-uang').value = '';
    }
    function tutupModal() { document.getElementById('modal-bayar').style.display = 'none'; }
    function formatRupiahInput(i) { i.value = new Intl.NumberFormat('id-ID').format(i.value.replace(/\D/g, '')); hitungKembalian(); }
    function hitungKembalian() {
        let total = Number(document.getElementById('total-tagihan-modal').innerText.replace(/\D/g, ''));
        let uang = Number(document.getElementById('input-uang').value.replace(/\D/g, ''));
        let info = document.getElementById('info-kembalian');
        if (uang >= total) { document.getElementById('nominal-kembalian').innerText = (uang - total).toLocaleString(); info.style.display = 'block'; } else { info.style.display = 'none'; }
    }
    function cetakDapur(pEncoded) { 
        let p = JSON.parse(decodeURIComponent(pEncoded)); 
        let items = typeof p.pesanan === 'string' ? JSON.parse(p.pesanan) : p.pesanan;
        let win = window.open('', '_blank', 'width=300,height=400'); 
        win.document.write(`<html><body style="font-family:monospace;"><h3>SLIP DAPUR<br>Meja: ${p.meja}</h3><ul>${items.map(i => `<li>${i.nama} x${i.jumlah}</li>`).join('')}</ul><script>window.print(); setTimeout(window.close, 500);<\/script></body></html>`); 
        win.document.close(); 
    }
    function konfirmasiBayar() { 
        fetch('/resto/kasir/bayar', { method: 'POST', headers: {'Content-Type': 'application/json', 'Authorization': 'Bearer ' + token}, body: JSON.stringify({id: idBayarSekarang, restoId: restoId}) }).then(() => { 
            let uangInput = document.getElementById('input-uang').value.replace(/\D/g, '') || 0;
            cetakStrukKasir(dataPesananSekarang, uangInput);
            tutupModal(); loadPesanan(); 
        }); 
    }
    function cetakStrukKasir(p, uangMasuk) {
        let items = typeof p.pesanan === 'string' ? JSON.parse(p.pesanan) : p.pesanan;
        let total = items.reduce((sum, i) => sum + (Number(i.harga) * Number(i.jumlah)), 0);
        let win = window.open('', '_blank', 'width=300,height=500');
        win.document.write(`<html><body style="font-family:monospace; font-size:12px;"><h3>STRUK RESTO</h3><p>Meja: ${p.meja} | ${p.nama}</p><hr>${items.map(i => `<div>${i.nama} x${i.jumlah}: Rp ${(i.harga * i.jumlah).toLocaleString()}</div>`).join('')}<hr><div>TOTAL: Rp ${total.toLocaleString()}</div><div>BAYAR: Rp ${Number(uangMasuk).toLocaleString()}</div><div>KEMBALI: Rp ${(Number(uangMasuk) - total).toLocaleString()}</div><script>window.onload=function(){window.print(); setTimeout(window.close, 500);}<\/script></body></html>`);
        win.document.close();
    }
    function selesaiPesanan(id) {
        fetch(`/menu/selesaikan/${id}`, { method: 'POST', headers: {'Content-Type': 'application/json', 'Authorization': 'Bearer ' + token} })
        .then(() => { loadPesanan(); alert("Pesanan telah dipindahkan ke Laporan Harian."); })
        .catch(err => console.error(err));
    }
    function prosesAksi(id, aksi) { if(aksi === 'batal' && confirm("Yakin batal?")) fetch('/resto/kasir/batal', { method: 'POST', headers: {'Content-Type': 'application/json', 'Authorization': 'Bearer ' + token}, body: JSON.stringify({id, restoId: restoId}) }).then(loadPesanan); }

function cetakOtomatis(p) {
    let win = window.open('', '_blank', 'width=300,height=500');
    win.document.write(`
        <html>
            <body style="font-family: monospace; font-size: 14px; padding: 10px;">
                <h3 style="text-align: center;">ORDER DAPUR</h3>
                <p>ID: ${p.id} | Meja: ${p.meja}</p>
                <hr>
                <div>Pesanan: ${p.nama}</div>
                <script>
                    window.onload = function() {
                        window.print(); 
                        setTimeout(function() { window.close(); }, 500);
                    }
                <\/script>
            </body>
        </html>
    `);
    win.document.close();
}

socket.on('pesanan_baru', async (data) => {
if (!window.location.href.includes('kasir')) {
        return; // Berhenti di sini jika bukan halaman kasir
    }
    if (typeof loadPesanan === 'function') loadPesanan();
    
    // 1. Panggil suara segera
    putarNotif();
    
    // 2. Gunakan setTimeout agar proses cetak tidak memblokir suara
    try {
        const restoId = localStorage.getItem('restoId') || 3;
        const response = await fetch(`/api/printer/settings?resto_id=${restoId}`);
        const settings = await response.json();

        if (settings && settings.auto_print === true) {
            setTimeout(() => cetakOtomatis(data), 500);
        }
    } catch (err) {
        console.error("Gagal menjalankan auto-print:", err);
    }
});

    setInterval(loadPesanan, 3000);
    loadPesanan();
</script>
</body>
</html>
